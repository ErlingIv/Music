<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lyricists — Norske Musikknoter</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400&family=Source+Serif+4:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #f7f4ee;
    --paper:   #fffef9;
    --ink:     #1a1814;
    --muted:   #7a7060;
    --faint:   #e8e2d4;
    --accent:  #8b3a1e;
    --accent2: #2a5c45;
    --border:  #d4cdc0;
    --serif:   'Playfair Display', Georgia, serif;
    --body:    'Source Serif 4', Georgia, serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { font-family: var(--body); background: var(--bg); color: var(--ink); min-height: 100vh; }

  /* ── Header ── */
  .site-header {
    background: var(--paper);
    border-bottom: 1px solid var(--border);
    padding: 1rem 2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
  }
  .back-link {
    font-size: 0.82rem;
    color: var(--muted);
    text-decoration: none;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .back-link:hover { color: var(--accent); }
  .site-name {
    font-family: var(--serif);
    font-size: 1rem;
    font-weight: 500;
    color: var(--ink);
    text-decoration: none;
  }

  /* ── Nav tabs ── */
  nav {
    display: flex;
    justify-content: center;
    gap: 0;
    background: var(--paper);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
  }
  .tab {
    padding: 0.9rem 2rem;
    font-family: var(--body);
    font-size: 0.88rem;
    font-weight: 400;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color 0.2s, border-color 0.2s;
    white-space: nowrap;
    user-select: none;
  }
  .tab:hover { color: var(--ink); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* ── Main ── */
  main { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

  /* ── Section panels ── */
  .section-panel { display: none; }
  .section-panel.active { display: block; }

  /* ── Section header ── */
  .section-header {
    display: flex;
    align-items: baseline;
    gap: 1rem;
    margin-bottom: 1.5rem;
    padding-bottom: 0.75rem;
    border-bottom: 1px solid var(--border);
  }
  .section-title {
    font-family: var(--serif);
    font-size: clamp(1.4rem, 3vw, 2rem);
    font-weight: 700;
    color: var(--ink);
  }
  .section-count {
    font-size: 0.82rem;
    color: var(--muted);
    letter-spacing: 0.04em;
  }

  /* ── Lyricist grid ── */
  .lyricist-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 0.6rem;
  }
  .lyricist-card {
    background: var(--paper);
    border: 1px solid var(--border);
    border-left: 4px solid var(--accent2);
    border-radius: 6px;
    padding: 0.7rem 0.9rem;
    text-decoration: none;
    display: block;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .lyricist-card:hover {
    border-color: var(--accent2);
    box-shadow: 0 2px 8px rgba(42,92,69,0.12);
  }
  .lyricist-name {
    font-family: var(--serif);
    font-size: 0.95rem;
    font-weight: 500;
    color: var(--ink);
    line-height: 1.3;
  }
  .lyricist-meta {
    font-size: 0.78rem;
    color: var(--muted);
    margin-top: 2px;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  .work-count {
    font-size: 0.75rem;
    color: var(--accent2);
  }
  .female-badge {
    font-size: 0.68rem;
    background: #f0e6f0;
    color: #7a3a7a;
    border: 1px solid #d4b8d4;
    border-radius: 3px;
    padding: 1px 5px;
  }

  /* ── Loading / empty states ── */
  .loading-state {
    text-align: center;
    padding: 3rem;
    color: var(--muted);
    font-size: 0.9rem;
    letter-spacing: 0.05em;
  }
  .loading-dots::after {
    content: '...';
    animation: dots 1.2s steps(4, end) infinite;
  }
  @keyframes dots {
    0%, 20% { content: '.'; }
    40%      { content: '..'; }
    60%, 100%{ content: '...'; }
  }

  footer {
    text-align: center;
    padding: 1.5rem;
    font-size: 0.78rem;
    color: var(--muted);
    border-top: 1px solid var(--border);
    letter-spacing: 0.04em;
  }
</style>
</head>
<body>

<header class="site-header">
  <a class="back-link" href="index.html">← Back</a>
  <a class="site-name" href="index.html" id="siteNameLink">Norske Musikknoter</a>
</header>

<nav>
  <div class="tab active" data-section="no"      onclick="switchTab('no')">🇳🇴 Norwegian</div>
  <div class="tab"        data-section="nordic"  onclick="switchTab('nordic')">Nordic</div>
  <div class="tab"        data-section="others"  onclick="switchTab('others')">Others</div>
</nav>

<main>

  <!-- Norwegian -->
  <div class="section-panel active" id="panel-no">
    <div class="section-header">
      <h1 class="section-title">✍ Norwegian Lyricists</h1>
      <span class="section-count" id="count-no"></span>
    </div>
    <div id="lyricists-no" class="lyricist-grid">
      <div class="loading-state" style="grid-column:1/-1"><span class="loading-dots">Loading</span></div>
    </div>
  </div>

  <!-- Nordic -->
  <div class="section-panel" id="panel-nordic">
    <div class="section-header">
      <h1 class="section-title">✍ Nordic Lyricists</h1>
      <span class="section-count" id="count-nordic"></span>
    </div>
    <div id="lyricists-nordic" class="lyricist-grid">
      <div class="loading-state" style="grid-column:1/-1"><span class="loading-dots">Loading</span></div>
    </div>
  </div>

  <!-- Others -->
  <div class="section-panel" id="panel-others">
    <div class="section-header">
      <h1 class="section-title">✍ Other Lyricists</h1>
      <span class="section-count" id="count-others"></span>
    </div>
    <div id="lyricists-others" class="lyricist-grid">
      <div class="loading-state" style="grid-column:1/-1"><span class="loading-dots">Loading</span></div>
    </div>
  </div>

</main>

<footer>
  Music Collection · Historical Nordic Sheet Music · Public Domain Scores
</footer>

<script src="config.js"></script>
<script>
document.getElementById('siteNameLink').textContent = SITE_NAME;
const SUPABASE_URL = 'https://tfqnzszyjsdgdeksizel.supabase.co';
const SUPABASE_KEY = 'sb_publishable_TxNG1PKrOD3NuBwCKzEfMA_b3-21kij';
const H = { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` };

const FLAGS = { NO:'🇳🇴', SE:'🇸🇪', DK:'🇩🇰', FI:'🇫🇮', IS:'🇮🇸',
                DE:'🇩🇪', US:'🇺🇸', FR:'🇫🇷', GB:'🇬🇧', IT:'🇮🇹',
                AT:'🇦🇹', BE:'🇧🇪', HU:'🇭🇺', AU:'🇦🇺', CZ:'🇨🇿',
                PL:'🇵🇱', VE:'🇻🇪' };

const NORDIC = ['SE', 'DK', 'FI', 'IS'];

// ── Tab switching ─────────────────────────────────────────────────────────────
function switchTab(sec) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`[data-section="${sec}"]`).classList.add('active');
  document.querySelectorAll('.section-panel').forEach(p => p.classList.remove('active'));
  document.getElementById(`panel-${sec}`).classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── Render a section ──────────────────────────────────────────────────────────
function renderSection(sec, list) {
  const countEl = document.getElementById(`count-${sec}`);
  const gridEl  = document.getElementById(`lyricists-${sec}`);

  countEl.textContent = `${list.length} lyricist${list.length !== 1 ? 's' : ''}`;

  if (!list.length) {
    gridEl.innerHTML = '<div class="loading-state" style="grid-column:1/-1">No lyricists found.</div>';
    return;
  }

  gridEl.innerHTML = list.map(p => lyricistCard(p)).join('');
}

function lyricistCard(p) {
  const years  = [p.born, p.died].filter(Boolean).join('–');
  const flag   = FLAGS[p.nationality] || '';
  const female = p.gender === 'F' ? '<span class="female-badge">♀</span>' : '';
  return `
    <a class="lyricist-card" href="composer.html?id=${p.person_id}&role=Lyricist">
      <div class="lyricist-name">${p.last_name}, ${p.first_name || ''} ${flag}</div>
      <div class="lyricist-meta">
        ${years ? `<span>${years}</span>` : ''}
        ${female}
        <span class="work-count">${p.work_count} work${p.work_count !== 1 ? 's' : ''}</span>
      </div>
    </a>
  `;
}

// ── Fetch and sort ────────────────────────────────────────────────────────────
async function fetchLyricists() {
  // 1. Find person_ids linked to PD compositions as Lyricist
  const pdPersonIds = new Set();
  const countMap = {};
  let offset = 0;
  while (true) {
    const r = await fetch(
      `${SUPABASE_URL}/rest/v1/composition_person?role=eq.Lyricist&select=person_id,composition:composition_id(public_domain,musescore_link)&limit=1000&offset=${offset}`,
      { headers: H }
    );
    const rows = await r.json();
    if (!rows.length) break;
    rows.forEach(row => {
      if (row.composition?.public_domain === 'Yes' && row.composition?.musescore_link) {
        pdPersonIds.add(row.person_id);
        countMap[row.person_id] = (countMap[row.person_id] || 0) + 1;
      }
    });
    if (rows.length < 1000) break;
    offset += 1000;
  }

  // 2. Fetch person records in chunks
  const ids = [...pdPersonIds];
  let persons = [];
  for (let i = 0; i < ids.length; i += 200) {
    const chunk = ids.slice(i, i + 200).join(',');
    const r = await fetch(
      `${SUPABASE_URL}/rest/v1/person?person_id=in.(${chunk})&select=person_id,first_name,last_name,born,died,nationality,gender&order=last_name.asc`,
      { headers: H }
    );
    persons = persons.concat(await r.json());
  }

  // 3. Attach counts
  persons.forEach(p => { p.work_count = countMap[p.person_id] || 0; });

  // 4. Split into sections and sort by last name
  const sections = { no: [], nordic: [], others: [] };
  persons.forEach(p => {
    if (p.nationality === 'NO') {
      sections.no.push(p);
    } else if (NORDIC.includes(p.nationality)) {
      sections.nordic.push(p);
    } else {
      sections.others.push(p);
    }
  });

  const sorter = (a, b) => (a.last_name || '').localeCompare(b.last_name || '', 'no');
  sections.no.sort(sorter);
  sections.nordic.sort(sorter);
  sections.others.sort(sorter);

  renderSection('no',     sections.no);
  renderSection('nordic', sections.nordic);
  renderSection('others', sections.others);
}

fetchLyricists();
</script>
</body>
</html>
