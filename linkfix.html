<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Link Label Tool — Norske Musikknoter</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Source+Serif+4:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #f7f4ee;
    --paper:   #fffef9;
    --ink:     #1a1814;
    --muted:   #7a7060;
    --faint:   #e8e2d4;
    --accent:  #8b3a1e;
    --accent2: #2a5c45;
    --border:  #d4cdc0;
    --serif:   'Playfair Display', Georgia, serif;
    --body:    'Source Serif 4', Georgia, serif;
    --highlight-bg: #fff3cd;
    --highlight-border: #e6a817;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--body); background: var(--bg); color: var(--ink); min-height: 100vh; }

  .site-header {
    background: var(--paper);
    border-bottom: 1px solid var(--border);
    padding: 1rem 2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
  }
  .back-link { font-size: 0.82rem; color: var(--muted); text-decoration: none; letter-spacing: 0.05em; text-transform: uppercase; }
  .back-link:hover { color: var(--accent); }
  .site-name { font-family: var(--serif); font-size: 1rem; font-weight: 500; color: var(--ink); text-decoration: none; }
  .header-right { margin-left: auto; font-size: 0.82rem; color: var(--muted); }

  main { max-width: 760px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

  .page-title { font-family: var(--serif); font-size: clamp(1.4rem, 3vw, 1.9rem); font-weight: 700; margin-bottom: 0.3rem; }
  .page-sub { font-size: 0.88rem; color: var(--muted); margin-bottom: 2rem; }

  .progress-wrap { background: var(--faint); border-radius: 4px; height: 6px; margin-bottom: 2rem; overflow: hidden; }
  .progress-bar { height: 100%; background: var(--accent2); border-radius: 4px; transition: width 0.4s ease; }
  .progress-label { font-size: 0.78rem; color: var(--muted); margin-bottom: 0.5rem; display: flex; justify-content: space-between; }

  .card { background: var(--paper); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 1.5rem; }
  .card-header { padding: 1rem 1.25rem 0.75rem; border-bottom: 1px solid var(--faint); display: flex; align-items: baseline; gap: 0.75rem; }
  .card-title { font-family: var(--serif); font-size: 1.15rem; font-weight: 600; color: var(--ink); }
  .card-id { font-size: 0.75rem; color: var(--muted); }
  .card-phase {
    margin-left: auto;
    font-size: 0.72rem;
    padding: 2px 9px;
    border-radius: 10px;
    border: 1px solid var(--border);
    color: var(--muted);
    background: var(--bg);
    letter-spacing: 0.03em;
  }
  .card-phase.edit-phase { background: #eaf3ee; color: var(--accent2); border-color: var(--accent2); }

  .notes-display {
    padding: 1rem 1.25rem;
    font-size: 0.92rem;
    line-height: 1.8;
    color: var(--ink);
    white-space: pre-wrap;
    word-break: break-word;
    border-bottom: 1px solid var(--faint);
    max-height: 260px;
    overflow-y: auto;
  }
  .bare-url {
    background: var(--highlight-bg);
    border: 1px solid var(--highlight-border);
    border-radius: 3px;
    padding: 1px 5px;
    font-family: monospace;
    font-size: 0.82em;
    color: #7a4a00;
    word-break: break-all;
  }
  .bare-url.current {
    background: #ffd166;
    border-color: #cc8800;
    box-shadow: 0 0 0 2px rgba(204,136,0,0.25);
  }

  .url-section { padding: 1rem 1.25rem; }
  .url-label-row { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.75rem; }
  .url-pill {
    font-family: monospace; font-size: 0.78rem;
    background: var(--faint); border: 1px solid var(--border);
    border-radius: 4px; padding: 4px 10px; color: var(--muted);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 420px;
  }
  .url-open { font-size: 0.75rem; color: var(--accent); text-decoration: none; flex-shrink: 0; }
  .url-open:hover { text-decoration: underline; }

  .input-row { display: flex; gap: 0.6rem; align-items: center; }
  .label-field {
    flex: 1; font-family: var(--body); font-size: 0.92rem;
    padding: 8px 12px; border: 1.5px solid var(--border);
    border-radius: 6px; background: var(--bg); color: var(--ink);
    outline: none; transition: border-color 0.15s;
  }
  .label-field:focus { border-color: var(--accent2); }
  .label-field::placeholder { color: var(--muted); }

  /* Edit textarea */
  .edit-section { padding: 1rem 1.25rem; }
  .edit-label {
    font-size: 0.78rem; color: var(--muted);
    margin-bottom: 0.5rem; letter-spacing: 0.03em; text-transform: uppercase;
  }
  .edit-textarea {
    width: 100%;
    min-height: 180px;
    font-family: var(--body);
    font-size: 0.88rem;
    line-height: 1.7;
    padding: 10px 12px;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    background: var(--bg);
    color: var(--ink);
    outline: none;
    resize: vertical;
    transition: border-color 0.15s;
  }
  .edit-textarea:focus { border-color: var(--accent2); }
  .edit-actions {
    display: flex;
    gap: 0.6rem;
    margin-top: 0.75rem;
    align-items: center;
  }
  .edit-hint {
    font-size: 0.75rem;
    color: var(--muted);
    margin-left: auto;
  }

  .btn {
    font-family: var(--body); font-size: 0.85rem;
    padding: 8px 18px; border-radius: 6px; border: 1.5px solid;
    cursor: pointer; transition: background 0.15s, color 0.15s; white-space: nowrap;
  }
  .btn-save { background: var(--accent2); border-color: var(--accent2); color: #fff; }
  .btn-save:hover { background: #1e4433; border-color: #1e4433; }
  .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-skip { background: transparent; border-color: var(--border); color: var(--muted); }
  .btn-skip:hover { border-color: var(--accent); color: var(--accent); }
  .btn-continue { background: transparent; border-color: var(--border); color: var(--muted); }
  .btn-continue:hover { border-color: var(--accent2); color: var(--accent2); }

  .multi-notice { font-size: 0.78rem; color: var(--muted); margin-top: 0.5rem; padding: 0.4rem 0.75rem; background: var(--faint); border-radius: 4px; }

  .loading-state { text-align: center; padding: 4rem 2rem; color: var(--muted); font-size: 0.95rem; }
  .done-state { text-align: center; padding: 4rem 2rem; }
  .done-icon { font-size: 2.5rem; margin-bottom: 1rem; }
  .done-title { font-family: var(--serif); font-size: 1.4rem; font-weight: 700; margin-bottom: 0.5rem; }
  .done-sub { font-size: 0.9rem; color: var(--muted); }
  .error-msg { font-size: 0.82rem; color: #a32d2d; margin-top: 0.5rem; padding: 0.4rem 0.75rem; background: #fdf0f0; border: 1px solid #e8c0c0; border-radius: 4px; }
</style>
</head>
<body>

<header class="site-header">
  <a class="back-link" href="index.html">← Back</a>
  <span class="site-name">Norske Musikknoter</span>
  <span class="header-right" id="headerCount"></span>
</header>

<main>
  <h1 class="page-title">🔗 Link Label Tool</h1>
  <p class="page-sub">Finds bare URLs in score notes and lets you give each one a readable label.</p>
  <div id="app"><div class="loading-state">Scanning database…</div></div>
</main>

<script>
const SUPABASE_URL = 'https://tfqnzszyjsdgdeksizel.supabase.co';
const SUPABASE_KEY = 'sb_publishable_TxNG1PKrOD3NuBwCKzEfMA_b3-21kij';
const H = {
  apikey: SUPABASE_KEY,
  Authorization: `Bearer ${SUPABASE_KEY}`,
  'Content-Type': 'application/json'
};

let queue = [];
let current = null;
let totalFound = 0;
let savedCount = 0;

function findBareUrls(text) {
  if (!text) return [];
  const re = /(?<!\[url=)(?<!href=")(https?:\/\/[^\s<\[]+)/g;
  const matches = [];
  let m;
  while ((m = re.exec(text)) !== null) {
    matches.push({ url: m[0], index: m.index });
  }
  return matches;
}

function buildNotesHtml(notes, bareUrls, currentUrl) {
  if (!notes) return '';
  let result = '';
  let pos = 0;
  const sorted = [...bareUrls].sort((a, b) => a.index - b.index);
  for (const { url, index } of sorted) {
    result += escHtml(notes.slice(pos, index));
    const isCurrent = url === currentUrl;
    result += `<span class="bare-url ${isCurrent ? 'current' : ''}">${escHtml(url)}</span>`;
    pos = index + url.length;
  }
  result += escHtml(notes.slice(pos));
  return result;
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function progressHtml() {
  const done = totalFound - queue.length;
  const pct  = totalFound > 0 ? (done / totalFound) * 100 : 0;
  return `
    <div class="progress-label">
      <span>${done} of ${totalFound} done</span>
      <span>${queue.length} remaining</span>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar" style="width:${pct}%"></div>
    </div>`;
}

async function fetchAll() {
  let all = [], offset = 0;
  const limit = 1000;
  while (true) {
    const r = await fetch(
      `${SUPABASE_URL}/rest/v1/composition?musescore_notes=like.*http*&select=composition_id,title,musescore_notes&order=title.asc&limit=${limit}&offset=${offset}`,
      { headers: H }
    );
    const batch = await r.json();
    all = all.concat(batch);
    if (batch.length < limit) break;
    offset += limit;
  }
  return all;
}

async function init() {
  try {
    const rows = await fetchAll();
    queue = [];
    for (const row of rows) {
      const bareUrls = findBareUrls(row.musescore_notes);
      if (!bareUrls.length) continue;
      for (const { url } of bareUrls) {
        queue.push({
          composition_id: row.composition_id,
          title: row.title,
          notes: row.musescore_notes,
          url,
          totalInScore: bareUrls.length
        });
      }
    }
    totalFound = queue.length;
    document.getElementById('headerCount').textContent =
      `${totalFound} bare URL${totalFound !== 1 ? 's' : ''} found`;
    if (!queue.length) { showDone(true); return; }
    advance();
  } catch(e) {
    document.getElementById('app').innerHTML =
      `<div class="loading-state" style="color:#a32d2d">Error: ${escHtml(e.message)}</div>`;
  }
}

function advance() {
  if (!queue.length) { showDone(false); return; }
  current = queue[0];
  renderUrl();
}

// ── Phase 1: label a single URL ──────────────────────────────────────────────
function renderUrl() {
  const bareUrls = findBareUrls(current.notes);
  const notesHtml = buildNotesHtml(current.notes, bareUrls, current.url);
  const multiNote = current.totalInScore > 1
    ? `<div class="multi-notice">ℹ This score has ${current.totalInScore} bare URLs — handling one at a time.</div>`
    : '';

  document.getElementById('app').innerHTML = `
    ${progressHtml()}
    <div class="card">
      <div class="card-header">
        <span class="card-title">${escHtml(current.title)}</span>
        <span class="card-id">#${current.composition_id}</span>
        <span class="card-phase">Label URL</span>
      </div>
      <div class="notes-display">${notesHtml}</div>
      <div class="url-section">
        <div class="url-label-row">
          <span class="url-pill" title="${escHtml(current.url)}">${escHtml(current.url)}</span>
          <a class="url-open" href="${escHtml(current.url)}" target="_blank">↗ open</a>
        </div>
        <div class="input-row">
          <input class="label-field" id="labelInput" type="text"
            placeholder="Enter link label…" autocomplete="off"
            onkeydown="handleUrlKey(event)">
          <button class="btn btn-save" id="saveBtn" onclick="saveUrl()">Save</button>
          <button class="btn btn-skip" onclick="skipUrl()">Skip</button>
        </div>
        ${multiNote}
        <div id="errMsg"></div>
      </div>
    </div>`;

  document.getElementById('labelInput').focus();
}

function handleUrlKey(e) {
  if (e.key === 'Enter') saveUrl();
  if (e.key === 'Escape') skipUrl();
}

async function saveUrl() {
  const label = document.getElementById('labelInput').value.trim();
  if (!label) {
    document.getElementById('errMsg').innerHTML =
      '<div class="error-msg">Please enter a label, or click Skip.</div>';
    return;
  }
  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.textContent = 'Saving…';

  try {
    // Re-fetch latest notes in case a prior save on this score changed them
    const r = await fetch(
      `${SUPABASE_URL}/rest/v1/composition?composition_id=eq.${current.composition_id}&select=musescore_notes`,
      { headers: H }
    );
    const fresh = (await r.json())[0];
    let notes = fresh?.musescore_notes || current.notes;

    const escapedUrl = current.url.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const replaceRe = new RegExp(`(?<!\\[url=)(?<!href=")(${escapedUrl})`);
    const updated = notes.replace(replaceRe, `[url=${current.url}]${label}[/url]`);

    const upR = await fetch(
      `${SUPABASE_URL}/rest/v1/composition?composition_id=eq.${current.composition_id}`,
      { method: 'PATCH', headers: H, body: JSON.stringify({ musescore_notes: updated }) }
    );
    if (!upR.ok) throw new Error(`HTTP ${upR.status}`);

    // Update notes in all remaining queue items for this score
    queue.forEach(item => {
      if (item.composition_id === current.composition_id) item.notes = updated;
    });

    savedCount++;
    queue.shift();

    // Check if remaining queue items belong to a different score
    const nextSameScore = queue.length > 0 && queue[0].composition_id === current.composition_id;

    if (nextSameScore) {
      // More URLs in this score — keep labelling
      current = queue[0];
      renderUrl();
    } else {
      // All URLs in this score are done — show edit step
      renderEdit(current.composition_id, current.title, updated);
    }
  } catch(e) {
    document.getElementById('errMsg').innerHTML =
      `<div class="error-msg">Save failed: ${escHtml(e.message)}</div>`;
    btn.disabled = false;
    btn.textContent = 'Save';
  }
}

function skipUrl() {
  const skippedId = current.composition_id;
  queue.shift();
  // If next item is same score, keep going with that score's next URL
  if (queue.length > 0 && queue[0].composition_id === skippedId) {
    current = queue[0];
    renderUrl();
  } else {
    // No more URLs for this score — go to edit step using latest known notes
    renderEdit(skippedId, current.title, current.notes);
  }
}

// ── Phase 2: review & edit full notes text ───────────────────────────────────
function renderEdit(compositionId, title, notes) {
  document.getElementById('app').innerHTML = `
    ${progressHtml()}
    <div class="card">
      <div class="card-header">
        <span class="card-title">${escHtml(title)}</span>
        <span class="card-id">#${compositionId}</span>
        <span class="card-phase edit-phase">Review &amp; edit</span>
      </div>
      <div class="edit-section">
        <div class="edit-label">Full notes text — edit freely before continuing</div>
        <textarea class="edit-textarea" id="editArea" spellcheck="true">${escHtml(notes)}</textarea>
        <div class="edit-actions">
          <button class="btn btn-save" id="editSaveBtn" onclick="saveEdit(${compositionId})">Save &amp; continue</button>
          <button class="btn btn-continue" onclick="advance()">Continue without saving</button>
          <span class="edit-hint">Ctrl+Enter to save</span>
        </div>
        <div id="editErrMsg"></div>
      </div>
    </div>`;

  const ta = document.getElementById('editArea');
  ta.focus();
  ta.addEventListener('keydown', e => {
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) saveEdit(compositionId);
  });
}

async function saveEdit(compositionId) {
  const text = document.getElementById('editArea').value;
  const btn = document.getElementById('editSaveBtn');
  btn.disabled = true;
  btn.textContent = 'Saving…';

  try {
    const upR = await fetch(
      `${SUPABASE_URL}/rest/v1/composition?composition_id=eq.${compositionId}`,
      { method: 'PATCH', headers: H, body: JSON.stringify({ musescore_notes: text }) }
    );
    if (!upR.ok) throw new Error(`HTTP ${upR.status}`);
    advance();
  } catch(e) {
    document.getElementById('editErrMsg').innerHTML =
      `<div class="error-msg">Save failed: ${escHtml(e.message)}</div>`;
    btn.disabled = false;
    btn.textContent = 'Save & continue';
  }
}

function showDone(wasClean) {
  document.getElementById('app').innerHTML = `
    <div class="done-state">
      <div class="done-icon">${wasClean ? '✓' : '🎉'}</div>
      <div class="done-title">${wasClean ? 'No bare URLs found' : 'All done!'}</div>
      <div class="done-sub">
        ${wasClean
          ? 'All links in the database already use BBCode labels.'
          : `${savedCount} URL${savedCount !== 1 ? 's' : ''} labelled.${totalFound - savedCount > 0 ? ' ' + (totalFound - savedCount) + ' skipped.' : ''}`
        }
      </div>
    </div>`;
  document.getElementById('headerCount').textContent = wasClean ? 'Nothing to do' : `${savedCount} saved`;
}

init();
</script>
</body>
</html>
