<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Score — Norske Musikknoter</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400&family=Source+Serif+4:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #f7f4ee;
    --paper:   #fffef9;
    --ink:     #1a1814;
    --muted:   #7a7060;
    --faint:   #e8e2d4;
    --accent:  #8b3a1e;
    --accent2: #2a5c45;
    --border:  #d4cdc0;
    --serif:   'Playfair Display', Georgia, serif;
    --body:    'Source Serif 4', Georgia, serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--body); background: var(--bg); color: var(--ink); min-height: 100vh; }

  .site-header {
    background: var(--paper);
    border-bottom: 1px solid var(--border);
    padding: 1rem 2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
  }
  .back-link {
    font-size: 0.82rem;
    color: var(--muted);
    text-decoration: none;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .back-link:hover { color: var(--accent); }
  .site-name {
    font-family: var(--serif);
    font-size: 1rem;
    font-weight: 500;
    color: var(--ink);
    text-decoration: none;
  }

  main { max-width: 760px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

  .score-card {
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 2rem;
  }
  .title-row {
    border-bottom: 1px solid var(--faint);
    padding-bottom: 1.25rem;
    margin-bottom: 1.25rem;
  }
  .score-title {
    font-family: var(--serif);
    font-size: clamp(1.4rem, 3vw, 2rem);
    font-weight: 700;
    line-height: 1.15;
    color: var(--ink);
    margin-bottom: 4px;
  }
  .score-sub { font-size: 0.95rem; color: var(--muted); margin-top: 4px; }

  .meta-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.25rem 2rem;
    margin-bottom: 1.5rem;
    margin-top: 1rem;
  }
  .meta-label {
    font-size: 0.7rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 3px;
  }
  .meta-value { font-size: 0.95rem; color: var(--ink); }
  .meta-year  { font-size: 0.95rem; color: var(--muted); }
  .meta-opus  { font-size: 0.95rem; color: var(--ink); }
  .composer-link { color: var(--accent); text-decoration: none; }
  .composer-link:hover { text-decoration: underline; }

  .section-label {
    font-size: 0.7rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 8px;
  }
  .media-section { margin-bottom: 1.5rem; }
  audio { width: 100%; margin-bottom: 0.5rem; }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 0.85rem;
    color: var(--ink);
    text-decoration: none;
    background: var(--bg);
    font-family: var(--body);
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn:hover { background: var(--faint); }

  .notes-section {
    margin-bottom: 1.5rem;
    border-left: 2px solid var(--faint);
    padding-left: 1rem;
  }
  .notes-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .notes-text {
    font-size: 0.93rem;
    color: #444441;
    line-height: 1.75;
  }
  .notes-text a { color: var(--accent); text-decoration: none; }
  .notes-text a:hover { text-decoration: underline; }

  .translate-btn {
    font-size: 0.75rem;
    font-family: var(--body);
    padding: 3px 10px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--bg);
    color: var(--muted);
    cursor: pointer;
    transition: background 0.15s;
  }
  .translate-btn:hover { background: var(--faint); color: var(--ink); }
  .translate-btn:disabled { opacity: 0.5; cursor: default; }

  .musescore-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 0.85rem;
    color: var(--accent);
    text-decoration: none;
    margin-top: 1rem;
    border: 1px solid var(--accent);
    border-radius: 5px;
    padding: 5px 12px;
    transition: background 0.15s;
  }
  .musescore-link:hover { background: var(--accent); color: #fff; }

  /* ── Media tabs ── */
  .media-tabs {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 1.25rem;
  }
  .media-tab {
    font-family: var(--body);
    font-size: 0.8rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 8px 18px;
    border: none;
    border-bottom: 2px solid transparent;
    background: none;
    color: var(--muted);
    cursor: pointer;
    margin-bottom: -1px;
    transition: color 0.15s, border-color 0.15s;
  }
  .media-tab:hover { color: var(--ink); }
  .media-tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 500; }
  .media-tab-panel { display: none; }
  .media-tab-panel.active { display: block; }

  .score-embed-wrapper iframe {
    display: block;
    width: 100%;
    height: 480px;
    border: none;
    border-radius: 6px;
  }

  .loading-state { text-align: center; padding: 3rem; color: var(--muted); font-size: 0.9rem; }
  .error-state { color: #a32d2d; font-size: 0.9rem; padding: 1rem 0; }
</style>
</head>
<body>

<header class="site-header">
  <a class="back-link" id="backLink" href="index.html">← Back</a>
  <a class="site-name" href="index.html" id="siteNameLink">Norske Musikknoter</a>
</header>

<main>
  <div class="score-card">
    <div id="content"><div class="loading-state">Loading…</div></div>
  </div>
</main>

<script src="config.js"></script>
<script>
document.getElementById('siteNameLink').textContent = SITE_NAME;
const SUPABASE_URL = 'https://tfqnzszyjsdgdeksizel.supabase.co';
const SUPABASE_KEY = 'sb_publishable_TxNG1PKrOD3NuBwCKzEfMA_b3-21kij';
const H = { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` };

// Global linkify — also used by translate.js
function linkify(text) {
  if (!text) return '';
  // Tag links: [tag=ID]name[/tag]
  text = text.replace(/\[tag=(\d+)\]([^\[]*)\[\/tag\]/gi,
    '<a href="tags.html?tag=$1" style="color:var(--accent2);text-decoration:underline;font-size:0.88em;border:1px solid var(--accent2);border-radius:3px;padding:1px 7px;">🏷 $2</a>');
  // BBCode: [url=https://...]text[/url]
  text = text.replace(/\[url=(https?:\/\/[^\]]+)\]([^\[]*)\[\/url\]/gi,
    '<a href="$1" target="_blank" style="color:var(--accent);text-decoration:underline">$2</a>');
  // Plain URLs not already inside an href or BBCode
  text = text.replace(/(?<!["=])(https?:\/\/[^\s<\[]+)/g,
    '<a href="$1" target="_blank" style="color:var(--accent);text-decoration:underline">$1</a>');
  return text;
}

const params = new URLSearchParams(window.location.search);
const compId = params.get('id');

// Set back link to return to composer page if we came from there
const referrer = document.referrer;
if (referrer && referrer.includes('composer.html')) {
  document.getElementById('backLink').href = referrer;
  document.getElementById('backLink').textContent = '← Composer';
}

function bbcodeToHtml(text) {
  return text
    .replace(/\[url=([^\]]+)\]([^\[]+)\[\/url\]/gi, '<a href="$1" target="_blank">$2</a>')
    .replace(/\[b\](.+?)\[\/b\]/gi, '<strong>$1</strong>')
    .replace(/\[i\](.+?)\[\/i\]/gi, '<em>$1</em>');
}

function lifespan(born, died, diedUncertain) {
  if (!born && !died) return '';
  if (born && !died) return born;
  if (!born && died)  return (diedUncertain === 'yes') ? 'after ' + died : died;
  return born + '–' + (diedUncertain === 'yes' ? 'after ' + died : died);
}

async function load() {
  const el = document.getElementById('content');
  if (!compId) {
    el.innerHTML = '<p class="error-state">No score ID specified.</p>';
    return;
  }

  try {
    // Fetch composition, score, and all contributors in parallel
    const [compR, scoreR, cpR] = await Promise.all([
      fetch(`${SUPABASE_URL}/rest/v1/composition?composition_id=eq.${compId}&select=composition_id,title,year_composed,opus_number,musescore_link,musescore_notes`, { headers: H }),
      fetch(`${SUPABASE_URL}/rest/v1/score?composition_id=eq.${compId}&select=pdf_url,mp3_url`, { headers: H }),
      fetch(`${SUPABASE_URL}/rest/v1/composition_person?composition_id=eq.${compId}&select=person_id,role,credited_as`, { headers: H }),
    ]);

    const comp  = (await compR.json())[0];
    const score = (await scoreR.json())[0];
    const cp    = await cpR.json();
    const cc    = cp.filter(r => r.role === 'Composer');
    const cl    = cp.filter(r => r.role === 'Lyricist');
    if (!comp) throw new Error('Score not found');

    document.title = `${comp.title} — ${SITE_NAME}`;

    // Fetch composer details
    const composerDisplayParts = [];
    let composerName = '—';
    let composerYears = '';

    for (const row of cc) {
      const pR = await fetch(
        `${SUPABASE_URL}/rest/v1/person?person_id=eq.${row.person_id}&select=person_id,first_name,last_name,born,died,died_uncertain`,
        { headers: H }
      );
      const p = (await pR.json())[0];
      if (p) {
        const displayName = row.credited_as || `${p.first_name} ${p.last_name}`;
        const years = lifespan(p.born, p.died, p.died_uncertain);
        const yearsStr = years ? ` <span style="color:var(--muted);font-size:0.88rem">(${years})</span>` : '';
        composerDisplayParts.push(`<a class="composer-link" href="composer.html?id=${p.person_id}">${displayName}</a>${yearsStr}`);
        if (composerName === '—') {
          composerName = displayName;
          composerYears = years ? `(${years})` : '';
        }
      }
    }
    const composerDisplay = composerDisplayParts.length ? composerDisplayParts.join(', ') : '—';

    // Fetch lyricist details
    const lyricistDisplayParts = [];
    for (const row of cl) {
      const pR = await fetch(
        `${SUPABASE_URL}/rest/v1/person?person_id=eq.${row.person_id}&select=person_id,first_name,last_name,born,died,died_uncertain`,
        { headers: H }
      );
      const p = (await pR.json())[0];
      if (p) {
        const displayName = row.credited_as || `${p.first_name} ${p.last_name}`;
        const years = lifespan(p.born, p.died, p.died_uncertain);
        const yearsStr = years ? ` <span style="color:var(--muted);font-size:0.88rem">(${years})</span>` : '';
        lyricistDisplayParts.push(`<span style="white-space:nowrap"><a class="composer-link" href="composer.html?id=${p.person_id}&role=Lyricist">${displayName}</a>${yearsStr}</span>`);
      }
    }
    const lyricistDisplay = lyricistDisplayParts.length ? lyricistDisplayParts.join(', ') : null;

    // Render notes: linkify URLs, newlines → <br>
    const notesHtml = comp.musescore_notes
      ? linkify(comp.musescore_notes.replace(/\n/g, '<br>'))
      : '';
    // Store raw notes in a JS variable — never inline into HTML attributes
    window._notesRaw = comp.musescore_notes || '';

    el.innerHTML = `
      <div class="title-row">
        <h1 class="score-title">${comp.title}</h1>
        <p class="score-sub">${composerDisplay}</p>
      </div>

      <div class="meta-grid">
        <div>
          ${comp.year_composed ? `<p class="meta-year">Composed ${comp.year_composed}</p>` : ''}
          ${lyricistDisplay    ? `<p class="meta-value" style="margin-top:0.3rem">Lyricist: ${lyricistDisplay}</p>` : ''}
        </div>
        <div>
          ${comp.opus_number ? `<p class="meta-opus">${comp.opus_number}</p>` : ''}
        </div>
      </div>

      ${notesHtml ? `
        <div class="notes-section">
          <div class="notes-header">
            <p class="section-label" style="margin-bottom:0">About the composition</p>
            <button class="translate-btn" id="translateBtn"
              onclick="translateNotes(this)">
              Translate to Norwegian
            </button>
          </div>
          <div class="notes-text" id="notesText">${notesHtml}</div>
        </div>` : ''}

      ${(comp.musescore_link || score?.pdf_url || score?.mp3_url) ? `
        <div class="media-section">
          <div class="media-tabs">
            ${comp.musescore_link ? `<button class="media-tab active" onclick="switchMediaTab('score', this)">Score</button>` : ''}
            ${score?.pdf_url     ? `<button class="media-tab ${!comp.musescore_link ? 'active' : ''}" onclick="switchMediaTab('pdf', this)">PDF</button>` : ''}
            ${score?.mp3_url     ? `<button class="media-tab ${(!comp.musescore_link && !score?.pdf_url) ? 'active' : ''}" onclick="switchMediaTab('audio', this)">Audio</button>` : ''}
          </div>

          ${comp.musescore_link ? `
            <div class="media-tab-panel active" id="tab-score">
              <div class="score-embed-wrapper" style="border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:10px;">
                <iframe src="${comp.musescore_link}/embed"
                  allowfullscreen allow="autoplay; fullscreen">
                </iframe>
              </div>
              <a class="musescore-link" href="${comp.musescore_link}" target="_blank">
                <svg width="12" height="12" viewBox="0 0 14 14" fill="none">
                  <path d="M5.5 2H3a1 1 0 00-1 1v8a1 1 0 001 1h8a1 1 0 001-1V8.5M8 2h4m0 0v4m0-4L6 8" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                View on MuseScore
              </a>
            </div>` : ''}

          ${score?.pdf_url ? `
            <div class="media-tab-panel ${!comp.musescore_link ? 'active' : ''}" id="tab-pdf">
              <div style="border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:8px;">
                <div style="display:flex;align-items:center;gap:0.5rem;padding:0.5rem 0.75rem;background:var(--bg);border-bottom:1px solid var(--border);">
                  <button class="btn" style="padding:4px 12px;" onclick="prevPage()">◀ Prev</button>
                  <span id="pageInfo" style="font-size:0.82rem;color:var(--muted);flex:1;text-align:center;">Loading…</span>
                  <button class="btn" style="padding:4px 12px;" onclick="nextPage()">Next ▶</button>
                </div>
                <div style="overflow:auto;max-height:80vh;background:#525659;text-align:center;">
                  <canvas id="pdf-canvas" style="display:block;margin:0 auto;max-width:100%;"></canvas>
                </div>
              </div>
              <a class="btn" href="${score.pdf_url}" target="_blank">
                <svg width="13" height="13" viewBox="0 0 14 14" fill="none">
                  <path d="M2 12h10M7 2v7M4 6l3 3 3-3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                Download PDF
              </a>
            </div>` : ''}

          ${score?.mp3_url ? `
            <div class="media-tab-panel ${(!comp.musescore_link && !score?.pdf_url) ? 'active' : ''}" id="tab-audio">
              <audio controls src="${score.mp3_url}" style="width:100%;margin-bottom:0.5rem;"></audio>
            </div>` : ''}
        </div>` : ''}
    `;

    // PDF: init only when PDF tab is shown (may not be the active tab)
    if (score?.pdf_url) {
      window._pdfUrl = score.pdf_url;
      if (!comp.musescore_link) setTimeout(() => initPdf(score.pdf_url), 0);
    }

  } catch(e) {
    document.getElementById('content').innerHTML =
      `<p class="error-state">Error: ${e.message}</p>`;
  }
}

load();


function switchMediaTab(tabId, btn) {
  // Update tab buttons
  document.querySelectorAll('.media-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  // Update panels
  document.querySelectorAll('.media-tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById(`tab-${tabId}`).classList.add('active');
  // Lazy-init PDF when switching to it
  if (tabId === 'pdf' && window._pdfUrl && !pdfDoc) {
    setTimeout(() => initPdf(window._pdfUrl), 0);
  }
}


</script>
<script src="translate.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let pdfDoc = null, pageNum = 1;

function initPdf(url) {
  pdfjsLib.getDocument(url).promise.then(pdf => {
    pdfDoc = pdf;
    renderPage(1);
  }).catch(err => {
    document.getElementById('pageInfo').textContent = 'Could not load PDF';
    console.error(err);
  });
}

function renderPage(num) {
  pdfDoc.getPage(num).then(page => {
    const canvas   = document.getElementById('pdf-canvas');
    const ctx      = canvas.getContext('2d');
    const scale    = Math.min(1.5, (window.innerWidth - 40) / page.getViewport({scale:1}).width);
    const viewport = page.getViewport({ scale });
    canvas.height  = viewport.height;
    canvas.width   = viewport.width;
    page.render({ canvasContext: ctx, viewport });
    document.getElementById('pageInfo').textContent =
      `Page ${num} of ${pdfDoc.numPages}`;
    pageNum = num;
  });
}

function prevPage() { if (pdfDoc && pageNum > 1) renderPage(pageNum - 1); }
function nextPage() { if (pdfDoc && pageNum < pdfDoc.numPages) renderPage(pageNum + 1); }
</script>
</body>
</html>
