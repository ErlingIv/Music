<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Score — Norske Musikknoter</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400&family=Source+Serif+4:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
  main { max-width: 760px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

  .score-card {
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 2rem;
  }
  .title-row {
    border-bottom: 1px solid var(--faint);
    padding-bottom: 1.25rem;
    margin-bottom: 1.25rem;
  }
  .score-title {
    font-family: var(--serif);
    font-size: clamp(1.4rem, 3vw, 2rem);
    font-weight: 700;
    line-height: 1.15;
    color: var(--ink);
    margin-bottom: 4px;
  }
  .score-sub { font-size: 0.95rem; color: var(--muted); margin-top: 4px; }

  .meta-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.25rem 2rem;
    margin-bottom: 1.5rem;
    margin-top: 1rem;
  }
  .meta-label {
    font-size: 0.7rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 3px;
  }
  .meta-value { font-size: 0.95rem; color: var(--ink); }
  .meta-year  { font-size: 0.95rem; color: var(--muted); }
  .meta-opus  { font-size: 0.95rem; color: var(--ink); }
  .score-title .meta-opus {
    font-family: var(--sans, inherit);
    font-weight: 400;
    font-size: 0.45em;
    color: var(--muted);
    letter-spacing: 0.02em;
  }
  .composer-link { color: var(--accent); text-decoration: none; }
  .composer-link:hover { text-decoration: underline; }

  /* Discrete Godkjent (approved) mark — small muted dot, no visible label */
  .godkjent-mark {
    display: inline-block;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--accent2);
    opacity: 0.5;
    margin-left: 8px;
    vertical-align: middle;
  }

  .section-label {
    font-size: 0.7rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 8px;
  }
  .media-section { margin-bottom: 1.5rem; }
  audio { width: 100%; margin-bottom: 0.5rem; }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 0.85rem;
    color: var(--ink);
    text-decoration: none;
    background: var(--bg);
    font-family: var(--body);
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn:hover { background: var(--faint); }

  .notes-section {
    margin-bottom: 1.5rem;
    border-left: 2px solid var(--faint);
    padding-left: 1rem;
  }
  .notes-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .notes-text {
    font-size: 0.93rem;
    color: #444441;
    line-height: 1.75;
  }
  .notes-text a { color: var(--accent); text-decoration: none; }
  .notes-text a:hover { text-decoration: underline; }

  .translate-btn {
    font-size: 0.75rem;
    font-family: var(--body);
    padding: 3px 10px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--bg);
    color: var(--muted);
    cursor: pointer;
    transition: background 0.15s;
  }
  .translate-btn:hover { background: var(--faint); color: var(--ink); }
  .translate-btn:disabled { opacity: 0.5; cursor: default; }

  .musescore-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 0.85rem;
    color: var(--accent);
    text-decoration: none;
    margin-top: 1rem;
    border: 1px solid var(--accent);
    border-radius: 5px;
    padding: 5px 12px;
    transition: background 0.15s;
  }
  .musescore-link:hover { background: var(--accent); color: #fff; }

  /* ── Media tabs ── */
  .media-tabs {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 1.25rem;
  }
  .media-tab {
    font-family: var(--body);
    font-size: 0.8rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 8px 18px;
    border: none;
    border-bottom: 2px solid transparent;
    background: none;
    color: var(--muted);
    cursor: pointer;
    margin-bottom: -1px;
    transition: color 0.15s, border-color 0.15s;
  }
  .media-tab:hover { color: var(--ink); }
  .media-tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 500; }
  .media-tab-panel { display: none; }
  .media-tab-panel.active { display: block; }

  .score-embed-wrapper iframe {
    display: block;
    width: 100%;
    height: 480px;
    border: none;
    border-radius: 6px;
  }

  .no-preview-box {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 2rem;
    text-align: center;
    margin-bottom: 10px;
    background: var(--bg);
  }
  .no-preview-box p { font-size: 0.9rem; color: var(--muted); }

  /* ── Responsive: phones (≤640px) ── */
  @media (max-width: 640px) {
    .score-card { padding: 1.25rem; }
    .meta-grid { grid-template-columns: 1fr; gap: 0.5rem 0; }
    .score-embed-wrapper iframe { height: 320px; }
    .media-tabs { overflow-x: auto; }
    .media-tab { padding: 8px 14px; font-size: 0.76rem; }
  }

</style>
</head>
<body>

<header class="site-header">
  <a class="back-link" id="backLink" href="index.html">← Back</a>
  <a class="site-name" href="index.html" id="siteNameLink">Norske Musikknoter</a>
</header>

<main>
  <div class="score-card">
    <div id="content"><div class="loading-state">Loading…</div></div>
  </div>
</main>

<script src="config.js"></script>
<script src="shared.js"></script>
<script>
document.getElementById('siteNameLink').textContent = SITE_NAME;
const SUPABASE_URL = 'https://tfqnzszyjsdgdeksizel.supabase.co';
const SUPABASE_KEY = 'sb_publishable_TxNG1PKrOD3NuBwCKzEfMA_b3-21kij';
const H = { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` };

// Set once the composition is fetched: 'pd' or 'copyright'. A single score is
// always one or the other — this isn't a visitor-chosen toggle like index.html.
let compMode = 'pd';
function modeParam() { return compMode === 'copyright' ? '&mode=copyright' : ''; }

// Global linkify — also used by translate.js
function linkify(text) {
  if (!text) return '';
  // Tag links: [tag=ID]name[/tag]
  text = text.replace(/\[tag=(\d+)\]([^\[]*)\[\/tag\]/gi,
    '<a href="tags.html?tag=$1' + modeParam() + '" style="color:var(--accent2);text-decoration:underline;font-size:0.88em;border:1px solid var(--accent2);border-radius:3px;padding:1px 7px;">🏷 $2</a>');
  // BBCode: [url=https://...]text[/url]
  text = text.replace(/\[url=(https?:\/\/[^\]]+)\]([^\[]*)\[\/url\]/gi,
    '<a href="$1" target="_blank" style="color:var(--accent);text-decoration:underline">$2</a>');
  // Plain URLs not already inside an href or BBCode
  text = text.replace(/(?<!["=])(https?:\/\/[^\s<\[]+)/g,
    '<a href="$1" target="_blank" style="color:var(--accent);text-decoration:underline">$1</a>');
  return text;
}

const params = new URLSearchParams(window.location.search);
const compId = params.get('id');

// Set back link to return to composer page if we came from there
const referrer = document.referrer;
if (referrer && referrer.includes('composer.html')) {
  document.getElementById('backLink').href = referrer;
  document.getElementById('backLink').textContent = '← Composer';
}

function bbcodeToHtml(text) {
  return text
    .replace(/\[url=([^\]]+)\]([^\[]+)\[\/url\]/gi, '<a href="$1" target="_blank">$2</a>')
    .replace(/\[b\](.+?)\[\/b\]/gi, '<strong>$1</strong>')
    .replace(/\[i\](.+?)\[\/i\]/gi, '<em>$1</em>');
}

async function load() {
  const el = document.getElementById('content');
  if (!compId) {
    el.innerHTML = '<p class="error-state">No score ID specified.</p>';
    return;
  }

  try {
    // Fetch composition, score, and all contributors in parallel
    const [compR, scoreR, cpR] = await Promise.all([
      fetch(`${SUPABASE_URL}/rest/v1/composition?composition_id=eq.${compId}&select=composition_id,title,year_composed,opus_number,musescore_link,musescore_notes,approved,dedication,public_domain`, { headers: H }),
      fetch(`${SUPABASE_URL}/rest/v1/score?composition_id=eq.${compId}&select=pdf_url,mp3_url,publisher_id,plate_number`, { headers: H }),
      fetch(`${SUPABASE_URL}/rest/v1/composition_person?composition_id=eq.${compId}&select=person_id,role,credited_as,translates_person_id`, { headers: H }),
    ]);

    const comp  = (await compR.json())[0];
    const score = (await scoreR.json())[0];
    const cpRaw = await cpR.json();

    // A malformed/nonexistent id (e.g. a non-numeric value) makes Supabase
    // return an error object instead of an array — guard against that here
    // so it surfaces as "Score not found" rather than a cryptic JS crash.
    if (!comp || !Array.isArray(cpRaw)) throw new Error('Score not found');
    const cp = cpRaw;

    // Fetch publisher name if present
    let publisherName = null;
    if (score?.publisher_id) {
      const pubR = await fetch(
        `${SUPABASE_URL}/rest/v1/publisher?publisher_id=eq.${score.publisher_id}&select=publisher_name`,
        { headers: H }
      );
      const pub = (await pubR.json())[0];
      if (pub) publisherName = pub.publisher_name;
    }

    const cc    = cp.filter(r => r.role === 'Composer');
    const cl    = cp.filter(r => r.role === 'Lyricist');
    const ci    = cp.filter(r => r.role === 'Illustrator');
    const ct    = cp.filter(r => r.role === 'Translator');

    compMode = comp.public_domain === 'Yes' ? 'pd' : 'copyright';
    if (!(referrer && referrer.includes('composer.html'))) {
      document.getElementById('backLink').href = 'index.html' + (compMode === 'copyright' ? '?mode=copyright' : '');
    }
    document.getElementById('siteNameLink').href = 'index.html' + (compMode === 'copyright' ? '?mode=copyright' : '');

    document.title = `${comp.title} — ${SITE_NAME}`;

    // Fetch composer details
    const composerDisplayParts = [];
    let composerName = '—';
    let composerYears = '';

    for (const row of cc) {
      const pR = await fetch(
        `${SUPABASE_URL}/rest/v1/person?person_id=eq.${row.person_id}&select=person_id,first_name,last_name,born,died,died_uncertain`,
        { headers: H }
      );
      const p = (await pR.json())[0];
      if (p) {
        const displayName = row.credited_as || `${p.first_name} ${p.last_name}`;
        const years = lifespan(p.born, p.died, p.died_uncertain);
        const yearsStr = years ? ` <span style="color:var(--muted);font-size:0.88rem">(${years})</span>` : '';
        composerDisplayParts.push(`<a class="composer-link" href="composer.html?id=${p.person_id}${modeParam()}">${displayName}</a>${yearsStr}`);
        if (composerName === '—') {
          composerName = displayName;
          composerYears = years ? `(${years})` : '';
        }
      }
    }
    const composerDisplay = composerDisplayParts.length ? composerDisplayParts.join(', ') : '—';

    // Fetch lyricist details
    const lyricistDisplayParts = [];
    const translatorLinesAll = [];
    for (const row of cl) {
      const pR = await fetch(
        `${SUPABASE_URL}/rest/v1/person?person_id=eq.${row.person_id}&select=person_id,first_name,last_name,born,died,died_uncertain`,
        { headers: H }
      );
      const p = (await pR.json())[0];
      if (p) {
        const displayName = row.credited_as || `${p.first_name} ${p.last_name}`;
        const years = lifespan(p.born, p.died, p.died_uncertain);
        const yearsStr = years ? ` <span style="color:var(--muted);font-size:0.88rem">(${years})</span>` : '';
        const line = `<span class="lyricist-line"><a class="composer-link" href="composer.html?id=${p.person_id}&role=Lyricist${modeParam()}">${displayName}</a>${yearsStr}</span>`;
        lyricistDisplayParts.push(line);

        // Any translators of this specific lyricist's text, on this composition —
        // rendered as their own flush-left line(s) below, not nested under the name.
        const translatorsOfThis = ct.filter(t => t.translates_person_id === p.person_id);
        for (const tRow of translatorsOfThis) {
          const tR = await fetch(
            `${SUPABASE_URL}/rest/v1/person?person_id=eq.${tRow.person_id}&select=person_id,first_name,last_name,born,died,died_uncertain`,
            { headers: H }
          );
          const tp = (await tR.json())[0];
          if (tp) {
            const tDisplayName = tRow.credited_as || `${tp.first_name} ${tp.last_name}`;
            const tYears = lifespan(tp.born, tp.died, tp.died_uncertain);
            const tYearsStr = tYears ? ` <span style="color:var(--muted);font-size:0.88rem">(${tYears})</span>` : '';
            translatorLinesAll.push(`translated by <a class="composer-link" href="composer.html?id=${tp.person_id}&role=Translator${modeParam()}">${tDisplayName}</a>${tYearsStr}`);
          }
        }
      }
    }
    const lyricistDisplay = lyricistDisplayParts.length
      ? `<span style="display:inline-flex;flex-direction:column;gap:0.15rem;vertical-align:top;">${lyricistDisplayParts.map((p, i) => `<span>${i > 0 ? ', ' : ''}${p}</span>`).join('')}</span>`
      : null;
    const translatorRows = translatorLinesAll.map(t => `<p class="meta-value" style="font-size:0.88rem;color:var(--muted);">${t}</p>`).join('');

    // Fetch illustrator details
    const illustratorDisplayParts = [];
    for (const row of ci) {
      const pR = await fetch(
        `${SUPABASE_URL}/rest/v1/person?person_id=eq.${row.person_id}&select=person_id,first_name,last_name,born,died,died_uncertain`,
        { headers: H }
      );
      const p = (await pR.json())[0];
      if (p) {
        const displayName = row.credited_as || `${p.first_name} ${p.last_name}`;
        const years = lifespan(p.born, p.died, p.died_uncertain);
        const yearsStr = years ? ` <span style="color:var(--muted);font-size:0.88rem">(${years})</span>` : '';
        illustratorDisplayParts.push(`<span style="white-space:nowrap"><a class="composer-link" href="composer.html?id=${p.person_id}&role=Illustrator${modeParam()}">${displayName}</a>${yearsStr}</span>`);
      }
    }
    const illustratorDisplay = illustratorDisplayParts.length ? illustratorDisplayParts.join(', ') : null;

    // Render notes: linkify URLs, newlines → <br>
    const notesHtml = comp.musescore_notes
      ? linkify(comp.musescore_notes.replace(/\n/g, '<br>'))
      : '';
    // Store raw notes in a JS variable — never inline into HTML attributes
    window._notesRaw = comp.musescore_notes || '';

    el.innerHTML = `
      <div class="title-row">
        <h1 class="score-title">${comp.title}${comp.opus_number ? ` <span class="meta-opus">${comp.opus_number}</span>` : ''}${comp.approved ? '<span class="godkjent-mark" role="img" aria-label="Curator approved" title="Curator approved"></span>' : ''}</h1>
        <p class="score-sub">${composerDisplay}</p>
      </div>

      <div style="margin-bottom:1.5rem;margin-top:1rem;">
        ${(comp.year_composed || publisherName || score?.plate_number) ? `
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:2rem;flex-wrap:wrap;">
          <div>${comp.year_composed ? `<p class="meta-year">Composed ${comp.year_composed}</p>` : ''}</div>
          <div style="text-align:right">${(publisherName || score?.plate_number) ? `<p style="font-size:0.85rem;color:var(--muted)">${publisherName || ''}${publisherName && score?.plate_number ? ' · ' : ''}${score?.plate_number ? 'Pl. ' + score.plate_number : ''}</p>` : ''}</div>
        </div>` : ''}
        ${(() => {
          // If there's no dedication, pair illustrator with the lyricist row to save a line.
          const illustratorOnLyricistRow = !comp.dedication && illustratorDisplay;
          const illustratorOnDedicationRow = comp.dedication && illustratorDisplay;
          let html = '';
          if (lyricistDisplay || illustratorOnLyricistRow) {
            html += `
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:2rem;flex-wrap:wrap;margin-top:0.3rem;">
          <div>${lyricistDisplay ? `<p class="meta-value">Lyricist: ${lyricistDisplay}</p>${translatorRows}` : ''}</div>
          <div style="text-align:right">${illustratorOnLyricistRow ? `<p class="meta-value">Illustrator: ${illustratorDisplay}</p>` : ''}</div>
        </div>`;
          }
          if (comp.dedication || illustratorOnDedicationRow) {
            html += `
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:2rem;flex-wrap:wrap;margin-top:0.3rem;">
          <div>${comp.dedication ? `<p class="meta-value" style="font-style:italic;color:var(--muted);">Dedicated to ${comp.dedication}</p>` : ''}</div>
          <div style="text-align:right">${illustratorOnDedicationRow ? `<p class="meta-value">Illustrator: ${illustratorDisplay}</p>` : ''}</div>
        </div>`;
          }
          return html;
        })()}
      </div>

      ${notesHtml ? `
        <div class="notes-section">
          <div class="notes-header">
            <p class="section-label" style="margin-bottom:0">About the composition</p>
            <button class="translate-btn" id="translateBtn"
              onclick="translateNotes(this)">
              Translate to Norwegian
            </button>
          </div>
          <div class="notes-text" id="notesText" aria-live="polite">${notesHtml}</div>
        </div>` : ''}

      ${(comp.musescore_link || score?.pdf_url || score?.mp3_url) ? `
        <div class="media-section">
          <div class="media-tabs" role="tablist" aria-label="Score media">
            ${comp.musescore_link ? `<button class="media-tab active" role="tab" id="mediatab-score" aria-selected="true" aria-controls="tab-score" onclick="switchMediaTab('score', this)">Score</button>` : ''}
            ${score?.pdf_url     ? `<button class="media-tab ${!comp.musescore_link ? 'active' : ''}" role="tab" id="mediatab-pdf" aria-selected="${!comp.musescore_link}" aria-controls="tab-pdf" onclick="switchMediaTab('pdf', this)">PDF</button>` : ''}
            ${score?.mp3_url     ? `<button class="media-tab ${(!comp.musescore_link && !score?.pdf_url) ? 'active' : ''}" role="tab" id="mediatab-audio" aria-selected="${!comp.musescore_link && !score?.pdf_url}" aria-controls="tab-audio" onclick="switchMediaTab('audio', this)">Audio</button>` : ''}
          </div>

          ${comp.musescore_link ? `
            <div class="media-tab-panel active" id="tab-score" role="tabpanel" aria-labelledby="mediatab-score">
              ${compMode === 'copyright' ? `
              <div class="no-preview-box">
                <p>Score preview isn't available for copyrighted works. You can still view it on MuseScore.</p>
              </div>` : `
              <div class="score-embed-wrapper" style="border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:10px;">
                <iframe src="${comp.musescore_link}/embed" title="MuseScore embedded score preview"
                  allowfullscreen allow="autoplay; fullscreen">
                </iframe>
              </div>`}
              <a class="musescore-link" href="${comp.musescore_link}" target="_blank">
                <svg width="12" height="12" viewBox="0 0 14 14" fill="none" aria-hidden="true">
                  <path d="M5.5 2H3a1 1 0 00-1 1v8a1 1 0 001 1h8a1 1 0 001-1V8.5M8 2h4m0 0v4m0-4L6 8" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                View on MuseScore
              </a>
            </div>` : ''}

          ${score?.pdf_url ? `
            <div class="media-tab-panel ${!comp.musescore_link ? 'active' : ''}" id="tab-pdf" role="tabpanel" aria-labelledby="mediatab-pdf">
              <div style="border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:8px;">
                <div style="display:flex;align-items:center;gap:0.5rem;padding:0.5rem 0.75rem;background:var(--bg);border-bottom:1px solid var(--border);">
                  <button class="btn" style="padding:4px 12px;" onclick="prevPage()" aria-label="Previous page">◀ Prev</button>
                  <span id="pageInfo" style="font-size:0.82rem;color:var(--muted);flex:1;text-align:center;" aria-live="polite">Loading…</span>
                  <button class="btn" style="padding:4px 12px;" onclick="nextPage()" aria-label="Next page">Next ▶</button>
                </div>
                <div style="overflow:auto;max-height:80vh;background:#525659;text-align:center;">
                  <canvas id="pdf-canvas" style="display:block;margin:0 auto;max-width:100%;" role="img" aria-label="PDF page preview"></canvas>
                </div>
              </div>
              <a class="btn" href="${score.pdf_url}" target="_blank">
                <svg width="13" height="13" viewBox="0 0 14 14" fill="none" aria-hidden="true">
                  <path d="M2 12h10M7 2v7M4 6l3 3 3-3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                Download PDF
              </a>
            </div>` : ''}

          ${score?.mp3_url ? `
            <div class="media-tab-panel ${(!comp.musescore_link && !score?.pdf_url) ? 'active' : ''}" id="tab-audio" role="tabpanel" aria-labelledby="mediatab-audio">
              <audio controls src="${score.mp3_url}" style="width:100%;margin-bottom:0.5rem;">
                Your browser does not support the audio element. <a href="${score.mp3_url}">Download the audio file</a> instead.
              </audio>
            </div>` : ''}
        </div>` : ''}
    `;

    // PDF: init only when PDF tab is shown (may not be the active tab)
    if (score?.pdf_url) {
      window._pdfUrl = score.pdf_url;
      if (!comp.musescore_link) setTimeout(() => initPdf(score.pdf_url), 0);
    }

  } catch(e) {
    document.getElementById('content').innerHTML =
      `<p class="error-state">Error: ${e.message}</p>`;
  }
}

load();


function switchMediaTab(tabId, btn) {
  // Update tab buttons
  document.querySelectorAll('.media-tab').forEach(t => {
    t.classList.remove('active');
    t.setAttribute('aria-selected', 'false');
  });
  btn.classList.add('active');
  btn.setAttribute('aria-selected', 'true');
  // Update panels
  document.querySelectorAll('.media-tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById(`tab-${tabId}`).classList.add('active');
  // Lazy-init PDF when switching to it
  if (tabId === 'pdf' && window._pdfUrl && !pdfDoc) {
    setTimeout(() => initPdf(window._pdfUrl), 0);
  }
}


</script>
<script src="translate.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let pdfDoc = null, pageNum = 1;

function initPdf(url) {
  pdfjsLib.getDocument(url).promise.then(pdf => {
    pdfDoc = pdf;
    renderPage(1);
  }).catch(err => {
    document.getElementById('pageInfo').textContent = 'Could not load PDF';
    console.error(err);
  });
}

function renderPage(num) {
  pdfDoc.getPage(num).then(page => {
    const canvas   = document.getElementById('pdf-canvas');
    const ctx      = canvas.getContext('2d');
    const scale    = Math.min(1.5, (window.innerWidth - 40) / page.getViewport({scale:1}).width);
    const viewport = page.getViewport({ scale });
    canvas.height  = viewport.height;
    canvas.width   = viewport.width;
    page.render({ canvasContext: ctx, viewport });
    document.getElementById('pageInfo').textContent =
      `Page ${num} of ${pdfDoc.numPages}`;
    pageNum = num;
  });
}

function prevPage() { if (pdfDoc && pageNum > 1) renderPage(pageNum - 1); }
function nextPage() { if (pdfDoc && pageNum < pdfDoc.numPages) renderPage(pageNum + 1); }
</script>
