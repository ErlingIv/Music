<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tags — Norske Musikknoter</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400&family=Source+Serif+4:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #f7f4ee;
    --paper:   #fffef9;
    --ink:     #1a1814;
    --muted:   #7a7060;
    --faint:   #e8e2d4;
    --accent:  #8b3a1e;
    --accent2: #2a5c45;
    --border:  #d4cdc0;
    --serif:   'Playfair Display', Georgia, serif;
    --body:    'Source Serif 4', Georgia, serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--body); background: var(--bg); color: var(--ink); min-height: 100vh; }

  .site-header {
    background: var(--paper);
    border-bottom: 1px solid var(--border);
    padding: 1rem 2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
  }
  .back-link {
    font-size: 0.82rem; color: var(--muted); text-decoration: none;
    letter-spacing: 0.05em; text-transform: uppercase;
  }
  .back-link:hover { color: var(--accent); }
  .site-name {
    font-family: var(--serif); font-size: 1rem; font-weight: 500;
    color: var(--ink); text-decoration: none;
  }

  main { max-width: 860px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

  .page-title {
    font-family: var(--serif);
    font-size: clamp(1.4rem, 3vw, 2rem);
    font-weight: 700;
    margin-bottom: 0.4rem;
  }
  .page-sub { font-size: 0.88rem; color: var(--muted); margin-bottom: 2rem; }

  /* ── Tags cloud ── */
  .tags-cloud {
    display: flex;
    flex-wrap: wrap;
    gap: 0.6rem;
    margin-bottom: 2.5rem;
  }
  .tag-pill {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    padding: 6px 14px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: var(--paper);
    font-size: 0.85rem;
    color: var(--ink);
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
    user-select: none;
  }
  .tag-pill:hover { border-color: var(--accent2); color: var(--accent2); }
  .tag-pill.active {
    background: var(--accent2);
    border-color: var(--accent2);
    color: #fff;
  }
  .tag-count {
    font-size: 0.72rem;
    opacity: 0.7;
  }

  /* ── Compositions list ── */
  .compositions-panel {
    display: none;
  }
  .compositions-panel.visible { display: block; }

  .panel-heading {
    font-family: var(--serif);
    font-size: 1.2rem;
    font-weight: 500;
    margin-bottom: 1rem;
    padding-bottom: 0.6rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 0.75rem;
  }
  .panel-count {
    font-family: var(--body);
    font-size: 0.82rem;
    color: var(--muted);
    font-weight: 400;
  }

  .comp-list { display: flex; flex-direction: column; gap: 0.45rem; }
  .comp-row {
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.75rem 1rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    text-decoration: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .comp-row:hover {
    border-color: var(--accent);
    box-shadow: 0 2px 8px rgba(139,58,30,0.08);
  }
  .comp-title {
    font-family: var(--serif);
    font-size: 0.95rem;
    font-weight: 500;
    color: var(--ink);
  }
  .comp-meta {
    font-size: 0.78rem;
    color: var(--muted);
    margin-top: 2px;
  }
  .comp-icons { display: flex; gap: 0.35rem; flex-shrink: 0; }
  .icon-badge {
    font-size: 0.68rem;
    padding: 2px 7px;
    border-radius: 3px;
    border: 1px solid var(--border);
    color: var(--muted);
    background: var(--bg);
  }
  .icon-badge.pdf { color: var(--accent); border-color: var(--accent); }
  .icon-badge.mp3 { color: var(--accent2); border-color: var(--accent2); }

  .loading-state { text-align: center; padding: 2rem; color: var(--muted); font-size: 0.9rem; }
  .empty-state   { color: var(--muted); font-size: 0.9rem; padding: 1.5rem 0; text-align: center; }
</style>
</head>
<body>

<header class="site-header">
  <a class="back-link" href="index.html">← Back</a>
  <a class="site-name" href="index.html">Norske Musikknoter</a>
</header>

<main>
  <h1 class="page-title">🏷 Browse by Tag</h1>
  <p class="page-sub">Select a tag to see all compositions in that category.</p>

  <div id="tagsCloud" class="tags-cloud">
    <div class="loading-state" style="width:100%">Loading tags…</div>
  </div>

  <div id="compositionsPanel" class="compositions-panel">
    <div class="panel-heading">
      <span id="panelTagName"></span>
      <span class="panel-count" id="panelCount"></span>
    </div>
    <div id="compList" class="comp-list"></div>
  </div>
</main>

<script>
const SUPABASE_URL = 'https://tfqnzszyjsdgdeksizel.supabase.co';
const SUPABASE_KEY = 'sb_publishable_TxNG1PKrOD3NuBwCKzEfMA_b3-21kij';
const H = { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` };

let allTags = [];
let activeTagId = null;

async function loadTags() {
  // Fetch all tags
  const r = await fetch(
    `${SUPABASE_URL}/rest/v1/tag?select=tag_id,tag_name&order=tag_name.asc`,
    { headers: H }
  );
  allTags = await r.json();

  // Fetch count per tag
  const ctR = await fetch(
    `${SUPABASE_URL}/rest/v1/composition_tag?select=tag_id`,
    { headers: H }
  );
  const ctRows = await ctR.json();
  const countMap = {};
  ctRows.forEach(row => {
    countMap[row.tag_id] = (countMap[row.tag_id] || 0) + 1;
  });

  const cloud = document.getElementById('tagsCloud');
  if (!allTags.length) {
    cloud.innerHTML = '<div class="empty-state">No tags found.</div>';
    return;
  }

  cloud.innerHTML = allTags.map(t => `
    <div class="tag-pill" id="tag-pill-${t.tag_id}" onclick="selectTag(${t.tag_id}, '${t.tag_name.replace(/'/g, "\\'")}')">
      ${t.tag_name}
      <span class="tag-count">${countMap[t.tag_id] || 0}</span>
    </div>
  `).join('');

  // If tag pre-selected from URL param
  const params = new URLSearchParams(window.location.search);
  const preTag = params.get('tag');
  if (preTag) {
    const match = allTags.find(t => t.tag_id == preTag);
    if (match) selectTag(match.tag_id, match.tag_name);
  }
}

async function selectTag(tagId, tagName) {
  // Toggle off if same tag clicked again
  if (activeTagId === tagId) {
    activeTagId = null;
    document.querySelectorAll('.tag-pill').forEach(p => p.classList.remove('active'));
    document.getElementById('compositionsPanel').classList.remove('visible');
    return;
  }

  activeTagId = tagId;
  document.querySelectorAll('.tag-pill').forEach(p => p.classList.remove('active'));
  document.getElementById(`tag-pill-${tagId}`).classList.add('active');

  const panel = document.getElementById('compositionsPanel');
  panel.classList.add('visible');
  document.getElementById('panelTagName').textContent = tagName;
  document.getElementById('panelCount').textContent = '';
  document.getElementById('compList').innerHTML = '<div class="loading-state">Loading…</div>';

  // Scroll to panel
  panel.scrollIntoView({ behavior: 'smooth', block: 'start' });

  // Fetch composition_ids for this tag
  const ctR = await fetch(
    `${SUPABASE_URL}/rest/v1/composition_tag?tag_id=eq.${tagId}&select=composition_id`,
    { headers: H }
  );
  const ctRows = await ctR.json();

  if (!ctRows.length) {
    document.getElementById('compList').innerHTML = '<div class="empty-state">No compositions with this tag.</div>';
    document.getElementById('panelCount').textContent = '0 compositions';
    return;
  }

  const compIds = ctRows.map(r => r.composition_id).join(',');

  // Fetch compositions + scores in parallel
  const [compR, scoreR] = await Promise.all([
    fetch(`${SUPABASE_URL}/rest/v1/composition?composition_id=in.(${compIds})&select=composition_id,title,year_composed,musescore_link,public_domain&order=title.asc`, { headers: H }),
    fetch(`${SUPABASE_URL}/rest/v1/score?composition_id=in.(${compIds})&select=composition_id,pdf_url,mp3_url`, { headers: H }),
  ]);
  const comps  = await compR.json();
  const scores = await scoreR.json();

  // Fetch composers for each composition in one batch
  const ccR = await fetch(
    `${SUPABASE_URL}/rest/v1/composition_person?composition_id=in.(${compIds})&role=eq.Composer&select=composition_id,person_id`,
    { headers: H }
  );
  const ccRows = await ccR.json();

  // Fetch person names
  const personIds = [...new Set(ccRows.map(r => r.person_id))];
  let persons = [];
  for (let i = 0; i < personIds.length; i += 200) {
    const chunk = personIds.slice(i, i + 200).join(',');
    const pR = await fetch(
      `${SUPABASE_URL}/rest/v1/person?person_id=in.(${chunk})&select=person_id,first_name,last_name`,
      { headers: H }
    );
    persons = persons.concat(await pR.json());
  }

  const personMap = Object.fromEntries(persons.map(p => [p.person_id, p]));
  const ccMap = {}; // composition_id → [person names]
  ccRows.forEach(row => {
    if (!ccMap[row.composition_id]) ccMap[row.composition_id] = [];
    const p = personMap[row.person_id];
    if (p) ccMap[row.composition_id].push(`${p.first_name || ''} ${p.last_name || ''}`.trim());
  });

  const scoreMap = {};
  scores.forEach(s => { scoreMap[s.composition_id] = s; });

  document.getElementById('panelCount').textContent =
    `${comps.length} composition${comps.length !== 1 ? 's' : ''}`;

  document.getElementById('compList').innerHTML = comps.map(comp => {
    const s = scoreMap[comp.composition_id];
    const composers = (ccMap[comp.composition_id] || []).join(', ') || '—';
    return `
      <a class="comp-row" href="score.html?id=${comp.composition_id}">
        <div>
          <div class="comp-title">${comp.title}</div>
          <div class="comp-meta">${composers}${comp.year_composed ? ' · ' + comp.year_composed : ''}</div>
        </div>
        <div class="comp-icons">
          ${s?.pdf_url ? '<span class="icon-badge pdf">PDF</span>' : ''}
          ${s?.mp3_url ? '<span class="icon-badge mp3">MP3</span>' : ''}
          ${comp.musescore_link ? '<span class="icon-badge">♪</span>' : ''}
          ${comp.public_domain === 'Yes' ? '<span class="icon-badge" style="color:var(--accent2);border-color:var(--accent2)">PD</span>' : ''}
        </div>
      </a>`;
  }).join('');
}

loadTags();
</script>
</body>
</html>
