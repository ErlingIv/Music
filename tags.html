<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tags — Norske Musikknoter</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400&family=Source+Serif+4:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #f7f4ee;
    --paper:   #fffef9;
    --ink:     #1a1814;
    --muted:   #7a7060;
    --faint:   #e8e2d4;
    --accent:  #8b3a1e;
    --accent2: #2a5c45;
    --border:  #d4cdc0;
    --serif:   'Playfair Display', Georgia, serif;
    --body:    'Source Serif 4', Georgia, serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--body); background: var(--bg); color: var(--ink); min-height: 100vh; }

  .site-header {
    background: var(--paper);
    border-bottom: 1px solid var(--border);
    padding: 1rem 2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
  }
  .back-link {
    font-size: 0.82rem; color: var(--muted); text-decoration: none;
    letter-spacing: 0.05em; text-transform: uppercase;
  }
  .back-link:hover { color: var(--accent); }
  .site-name {
    font-family: var(--serif); font-size: 1rem; font-weight: 500;
    color: var(--ink); text-decoration: none;
  }

  main { max-width: 860px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

  .page-title {
    font-family: var(--serif);
    font-size: clamp(1.4rem, 3vw, 2rem);
    font-weight: 700;
    margin-bottom: 0.4rem;
  }
  .page-sub { font-size: 0.88rem; color: var(--muted); margin-bottom: 2rem; }

  /* ── Tags cloud view ── */
  #tagsView { display: block; }
  #tagsView.hidden { display: none; }

  .tags-cloud {
    display: flex;
    flex-wrap: wrap;
    gap: 0.6rem;
  }
  .tag-pill {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    padding: 6px 14px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: var(--paper);
    font-size: 0.85rem;
    color: var(--ink);
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
    user-select: none;
  }
  .tag-pill:hover { border-color: var(--accent2); color: var(--accent2); }
  .tag-count { font-size: 0.72rem; opacity: 0.7; }

  /* ── Tag detail view ── */
  #tagView { display: none; }
  #tagView.visible { display: block; }

  .tag-back-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.82rem;
    color: var(--muted);
    cursor: pointer;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-bottom: 1.5rem;
    background: none;
    border: none;
    padding: 0;
    font-family: var(--body);
  }
  .tag-back-btn:hover { color: var(--accent); }

  /* ── Hero image ── */
  .tag-hero {
    width: 100%;
    height: 240px;
    border-radius: 10px 10px 0 0;
    overflow: hidden;
    position: relative;
    background: var(--faint);
    display: none;
  }
  .tag-hero.loaded { display: block; }

  .tag-hero img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 35%;
    display: block;
    transition: opacity 0.4s;
    opacity: 0;
  }
  .tag-hero img.ready { opacity: 1; }

  .tag-hero-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(0,0,0,0.02) 40%,
      rgba(26,24,20,0.6) 100%
    );
  }
  .tag-hero-label {
    position: absolute;
    bottom: 1rem;
    left: 1.2rem;
    font-family: var(--serif);
    font-size: 1.6rem;
    font-weight: 700;
    color: #fff;
    text-shadow: 0 1px 4px rgba(0,0,0,0.5);
  }
  .tag-hero-caption {
    position: absolute;
    bottom: 0.5rem;
    right: 0.8rem;
    font-size: 0.62rem;
    color: rgba(255,255,255,0.5);
    font-style: italic;
    text-align: right;
    max-width: 55%;
    line-height: 1.3;
  }
  .tag-hero-caption a { color: rgba(255,255,255,0.55); text-decoration: underline; }

  /* ── Panel heading (below hero or standalone) ── */
  .panel-box {
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .panel-box.has-hero { border-radius: 0 0 10px 10px; border-top: none; }

  .panel-heading {
    font-family: var(--serif);
    font-size: 1.1rem;
    font-weight: 500;
    padding: 0.85rem 1.1rem;
    border-bottom: 1px solid var(--faint);
    display: flex;
    align-items: baseline;
    gap: 0.75rem;
    background: var(--paper);
  }
  .panel-count {
    font-family: var(--body);
    font-size: 0.82rem;
    color: var(--muted);
    font-weight: 400;
  }

  /* ── Composition list ── */
  .comp-list {
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  .comp-row {
    padding: 0.75rem 1.1rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    text-decoration: none;
    border-bottom: 1px solid var(--faint);
    transition: background 0.12s;
  }
  .comp-row:last-child { border-bottom: none; }
  .comp-row:hover { background: var(--bg); }
  .comp-title {
    font-family: var(--serif);
    font-size: 0.95rem;
    font-weight: 500;
    color: var(--ink);
  }
  .comp-meta { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }
  .comp-icons { display: flex; gap: 0.35rem; flex-shrink: 0; }
  .icon-badge {
    font-size: 0.68rem;
    padding: 2px 7px;
    border-radius: 3px;
    border: 1px solid var(--border);
    color: var(--muted);
    background: var(--bg);
  }
  .icon-badge.pdf { color: var(--accent); border-color: var(--accent); }
  .icon-badge.mp3 { color: var(--accent2); border-color: var(--accent2); }

  .loading-state { text-align: center; padding: 2rem; color: var(--muted); font-size: 0.9rem; }
  .empty-state   { color: var(--muted); font-size: 0.9rem; padding: 1.5rem; text-align: center; }
</style>
</head>
<body>

<header class="site-header">
  <a class="back-link" href="index.html">← Back</a>
  <a class="site-name" href="index.html" id="siteNameLink">Norske Musikknoter</a>
</header>

<main>

  <!-- ── Tag cloud view ── -->
  <div id="tagsView">
    <h1 class="page-title">🏷 Browse by Tag</h1>
    <p class="page-sub">Select a tag to see all compositions in that category.</p>
    <div id="tagsCloud" class="tags-cloud">
      <div class="loading-state" style="width:100%">Loading tags…</div>
    </div>
  </div>

  <!-- ── Tag detail view ── -->
  <div id="tagView">
    <button class="tag-back-btn" onclick="showTagCloud()">← All tags</button>

    <!-- Hero image (shown when a matching image is found) -->
    <div class="tag-hero" id="tagHero">
      <img id="tagHeroImg" src="" alt="">
      <div class="tag-hero-overlay"></div>
      <div class="tag-hero-label" id="tagHeroLabel"></div>
      <div class="tag-hero-caption" id="tagHeroCaption"></div>
    </div>

    <!-- Composition list panel -->
    <div class="panel-box" id="panelBox">
      <div class="panel-heading">
        <span id="panelTagName"></span>
        <span class="panel-count" id="panelCount"></span>
      </div>
      <div id="compList" class="comp-list">
        <div class="loading-state">Loading…</div>
      </div>
    </div>
  </div>

</main>

<script src="config.js"></script>
<script>
document.getElementById('siteNameLink').textContent = SITE_NAME;
const SUPABASE_URL = 'https://tfqnzszyjsdgdeksizel.supabase.co';
const SUPABASE_KEY = 'sb_publishable_TxNG1PKrOD3NuBwCKzEfMA_b3-21kij';
const H = { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` };

// ── Tag name → Wikimedia Commons search query ─────────────────────────────────
// Keys matched as lowercase substrings of tag name.
// Add new entries here as new tags are created.
const TAG_IMAGE_QUERIES = {
  'polar':              'Nansen Fram arctic expedition photograph',
  'arktis':             'Nansen Fram arctic expedition photograph',
  '1905':               'Norway 1905 independence union dissolution',
  'norge 1905':         'Norway 1905 independence procession photograph',
  'norsk-amerikansk':   'Norwegian emigrants America steamship 1900s',
  'norsk-american':     'Norwegian emigrants America steamship 1900s',
  'norwegian-american': 'Norwegian emigrants America steamship 1900s',
  'kongefamilie':       'Norwegian royal family King Haakon 1905 photograph',
  'royal':              'Norwegian royal family King Haakon 1905 photograph',
  'bergen':             'Bergen Norway harbour 1900 vintage photograph',
  'hefte':              'music score sheet vintage Norway',
  'carl warmuth':       'music score sheet vintage Norway',
  'folk':               'Hardanger fiddle Norway traditional folk',
  'church':             'Norwegian stave church medieval',
  'hymn':               'Norwegian church organ interior',
  'grieg':              'Edvard Grieg composer Norway',
  'national':           'Norway mountain landscape Romanticism painting',
  'march':              'Norwegian military procession parade 1900s',
  'waltz':              'ballroom dance Vienna 1900s vintage',
  'dance':              'Norwegian folk dance Halling vintage',
  'children':           'Norwegian children vintage illustration',
  'christmas':          'Norway Christmas vintage jul illustration',
  'sea':                'Norwegian fishing boat fjord vintage photograph',
  'mountain':           'Norwegian mountain Jotunheimen vintage',
  'piano':              'grand piano concert hall vintage',
  'violin':             'Ole Bull violin Norway portrait',
  'opera':              'opera stage Norway vintage',
  'serenade':           'evening concert garden vintage Norway',
};

function getImageQuery(tagName) {
  const lower = tagName.toLowerCase();
  // Exact match first
  if (TAG_IMAGE_QUERIES[lower]) return TAG_IMAGE_QUERIES[lower];
  // Substring match
  for (const [key, query] of Object.entries(TAG_IMAGE_QUERIES)) {
    if (lower.includes(key)) return query;
  }
  return null;
}

// ── Wikimedia Commons image fetch ─────────────────────────────────────────────
// Uses generator=search with prop=pageimages for a direct thumbnail URL.
async function fetchWikimediaImage(searchQuery) {
  const params = new URLSearchParams({
    action:       'query',
    generator:    'search',
    gsrsearch:    searchQuery,
    gsrnamespace: '6',       // File namespace only
    gsrlimit:     '12',
    prop:         'imageinfo',
    iiprop:       'url|extmetadata|mime|size',
    iiurlwidth:   '900',
    format:       'json',
    origin:       '*',
  });
  try {
    const r = await fetch(`https://commons.wikimedia.org/w/api.php?${params}`);
    const data = await r.json();
    const pages = Object.values(data?.query?.pages || {});

    // Sort by page id (relevance order) and pick first usable photo
    pages.sort((a, b) => (a.index || a.pageid) - (b.index || b.pageid));

    for (const page of pages) {
      const ii = page.imageinfo?.[0];
      if (!ii) continue;
      const url = ii.url || '';
      const mime = ii.mime || '';
      const w = ii.width || 0;
      const h = ii.height || 0;
      // Skip non-photos, very tall/narrow (portrait orientation badly distorted), small images
      if (!mime.startsWith('image/jpeg') && !mime.startsWith('image/png')) continue;
      if (w < 600 || h < 300) continue;
      if (h > w * 1.2) continue; // skip portrait-dominant images
      const thumbUrl = ii.thumburl || url; // iiurlwidth gives thumburl

      // Attribution
      const meta   = ii.extmetadata || {};
      const artist = meta.Artist?.value   ? stripHtml(meta.Artist.value)   : '';
      const credit = meta.Credit?.value   ? stripHtml(meta.Credit.value)   : '';
      const desc   = meta.ImageDescription?.value ? stripHtml(meta.ImageDescription.value).slice(0, 80) : '';
      const caption = artist || credit || desc || '';
      const pageLink = `https://commons.wikimedia.org/wiki/${encodeURIComponent(page.title)}`;

      return { url: thumbUrl, caption, pageLink, title: page.title };
    }
  } catch (e) { /* silent — no image */ }
  return null;
}

function stripHtml(html) {
  const d = document.createElement('div');
  d.innerHTML = html;
  return (d.textContent || d.innerText || '').trim();
}

// ── Show/hide views ───────────────────────────────────────────────────────────
function showTagCloud() {
  document.getElementById('tagsView').classList.remove('hidden');
  document.getElementById('tagView').classList.remove('visible');
  document.getElementById('tagHero').classList.remove('loaded');
  // Clear active pill
  document.querySelectorAll('.tag-pill').forEach(p => p.classList.remove('active'));
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showTagDetail() {
  document.getElementById('tagsView').classList.add('hidden');
  document.getElementById('tagView').classList.add('visible');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── Load hero image for tag ───────────────────────────────────────────────────
async function loadHeroImage(tagName) {
  const hero    = document.getElementById('tagHero');
  const img     = document.getElementById('tagHeroImg');
  const label   = document.getElementById('tagHeroLabel');
  const caption = document.getElementById('tagHeroCaption');
  const panelBox = document.getElementById('panelBox');

  // Reset
  hero.classList.remove('loaded');
  img.classList.remove('ready');
  panelBox.classList.remove('has-hero');

  const query = getImageQuery(tagName);
  if (!query) return;

  const result = await fetchWikimediaImage(query);
  if (!result) return;

  label.textContent = tagName;

  if (result.caption) {
    caption.innerHTML = result.caption +
      (result.pageLink ? ` · <a href="${result.pageLink}" target="_blank" rel="noopener">Wikimedia Commons</a>` : '');
  } else {
    caption.innerHTML = result.pageLink
      ? `<a href="${result.pageLink}" target="_blank" rel="noopener">Wikimedia Commons</a>` : '';
  }

  img.onload = () => {
    hero.classList.add('loaded');
    panelBox.classList.add('has-hero');
    img.classList.add('ready');
  };
  img.onerror = () => {
    hero.classList.remove('loaded');
    panelBox.classList.remove('has-hero');
  };
  img.src = result.url;
  img.alt = tagName;
}

// ── Tags loading ──────────────────────────────────────────────────────────────
let allTags = [];

async function loadTags() {
  const r = await fetch(
    `${SUPABASE_URL}/rest/v1/tag?select=tag_id,tag_name&order=tag_name.asc`,
    { headers: H }
  );
  allTags = await r.json();

  const ctR = await fetch(
    `${SUPABASE_URL}/rest/v1/composition_tag?select=tag_id`,
    { headers: H }
  );
  const countMap = {};
  (await ctR.json()).forEach(row => {
    countMap[row.tag_id] = (countMap[row.tag_id] || 0) + 1;
  });

  const cloud = document.getElementById('tagsCloud');
  if (!allTags.length) {
    cloud.innerHTML = '<div class="empty-state">No tags found.</div>';
    return;
  }

  cloud.innerHTML = allTags.map(t => `
    <div class="tag-pill" id="tag-pill-${t.tag_id}"
         onclick="selectTag(${t.tag_id}, '${t.tag_name.replace(/'/g, "\\'")}')">
      ${t.tag_name}
      <span class="tag-count">${countMap[t.tag_id] || 0}</span>
    </div>
  `).join('');

  // Pre-select from URL param
  const preTag = new URLSearchParams(window.location.search).get('tag');
  if (preTag) {
    const match = allTags.find(t => t.tag_id == preTag);
    if (match) selectTag(match.tag_id, match.tag_name);
  }
}

// ── Select tag ────────────────────────────────────────────────────────────────
async function selectTag(tagId, tagName) {
  // Switch to detail view immediately
  document.getElementById('panelTagName').textContent = tagName;
  document.getElementById('panelCount').textContent = '';
  document.getElementById('compList').innerHTML = '<div class="loading-state">Loading…</div>';
  showTagDetail();

  // Fire image load in parallel
  loadHeroImage(tagName);

  // Fetch composition_ids for this tag
  const ctR = await fetch(
    `${SUPABASE_URL}/rest/v1/composition_tag?tag_id=eq.${tagId}&select=composition_id`,
    { headers: H }
  );
  const ctRows = await ctR.json();

  if (!ctRows.length) {
    document.getElementById('compList').innerHTML = '<div class="empty-state">No compositions with this tag.</div>';
    document.getElementById('panelCount').textContent = '0 compositions';
    return;
  }

  const compIds = ctRows.map(r => r.composition_id).join(',');

  const [compR, scoreR, ccR] = await Promise.all([
    fetch(`${SUPABASE_URL}/rest/v1/composition?composition_id=in.(${compIds})&public_domain=eq.Yes&musescore_link=not.is.null&select=composition_id,title,year_composed,musescore_link,public_domain&order=title.asc`, { headers: H }),
    fetch(`${SUPABASE_URL}/rest/v1/score?composition_id=in.(${compIds})&select=composition_id,pdf_url,mp3_url`, { headers: H }),
    fetch(`${SUPABASE_URL}/rest/v1/composition_person?composition_id=in.(${compIds})&role=eq.Composer&select=composition_id,person_id`, { headers: H }),
  ]);

  const comps  = await compR.json();
  const scores = await scoreR.json();
  const ccRows = await ccR.json();

  // Fetch composer names
  const personIds = [...new Set(ccRows.map(r => r.person_id))];
  let persons = [];
  for (let i = 0; i < personIds.length; i += 200) {
    const chunk = personIds.slice(i, i + 200).join(',');
    const pR = await fetch(
      `${SUPABASE_URL}/rest/v1/person?person_id=in.(${chunk})&select=person_id,first_name,last_name`,
      { headers: H }
    );
    persons = persons.concat(await pR.json());
  }

  const personMap = Object.fromEntries(persons.map(p => [p.person_id, p]));
  const ccMap = {};
  ccRows.forEach(row => {
    if (!ccMap[row.composition_id]) ccMap[row.composition_id] = [];
    const p = personMap[row.person_id];
    if (p) ccMap[row.composition_id].push(`${p.first_name || ''} ${p.last_name || ''}`.trim());
  });

  const scoreMap = {};
  scores.forEach(s => { scoreMap[s.composition_id] = s; });

  document.getElementById('panelCount').textContent =
    `${comps.length} composition${comps.length !== 1 ? 's' : ''}`;

  document.getElementById('compList').innerHTML = comps.length
    ? comps.map(comp => {
        const s = scoreMap[comp.composition_id];
        const composers = (ccMap[comp.composition_id] || []).join(', ') || '—';
        return `
          <a class="comp-row" href="score.html?id=${comp.composition_id}">
            <div>
              <div class="comp-title">${comp.title}</div>
              <div class="comp-meta">${composers}${comp.year_composed ? ' · ' + comp.year_composed : ''}</div>
            </div>
            <div class="comp-icons">
              ${s?.pdf_url ? '<span class="icon-badge pdf">PDF</span>' : ''}
              ${s?.mp3_url ? '<span class="icon-badge mp3">MP3</span>' : ''}
              ${comp.musescore_link ? '<span class="icon-badge">♪</span>' : ''}
              ${comp.public_domain === 'Yes' ? '<span class="icon-badge" style="color:var(--accent2);border-color:var(--accent2)">PD</span>' : ''}
            </div>
          </a>`;
      }).join('')
    : '<div class="empty-state">No public domain scores found for this tag.</div>';
}

loadTags();
</script>
</body>
</html>
