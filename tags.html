<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tags — Norske Musikknoter</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400&family=Source+Serif+4:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #f7f4ee;
    --paper:   #fffef9;
    --ink:     #1a1814;
    --muted:   #7a7060;
    --faint:   #e8e2d4;
    --accent:  #8b3a1e;
    --accent2: #2a5c45;
    --border:  #d4cdc0;
    --serif:   'Playfair Display', Georgia, serif;
    --body:    'Source Serif 4', Georgia, serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--body); background: var(--bg); color: var(--ink); min-height: 100vh; }

  .site-header {
    background: var(--paper);
    border-bottom: 1px solid var(--border);
    padding: 1rem 2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
  }
  .back-link {
    font-size: 0.82rem; color: var(--muted); text-decoration: none;
    letter-spacing: 0.05em; text-transform: uppercase;
  }
  .back-link:hover { color: var(--accent); }
  .site-name {
    font-family: var(--serif); font-size: 1rem; font-weight: 500;
    color: var(--ink); text-decoration: none;
  }

  main { max-width: 860px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

  .page-title {
    font-family: var(--serif);
    font-size: clamp(1.4rem, 3vw, 2rem);
    font-weight: 700;
    margin-bottom: 0.4rem;
  }
  .page-sub { font-size: 0.88rem; color: var(--muted); margin-bottom: 2rem; }

  /* ── Tags cloud view ── */
  #tagsView { display: block; }
  #tagsView.hidden { display: none; }

  .tags-cloud {
    display: flex;
    flex-wrap: wrap;
    gap: 0.6rem;
  }
  .tag-pill {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    padding: 6px 14px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: var(--paper);
    font-size: 0.85rem;
    color: var(--ink);
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
    user-select: none;
  }
  .tag-pill:hover { border-color: var(--accent2); color: var(--accent2); }
  .tag-count { font-size: 0.72rem; opacity: 0.7; }

  /* ── Tag detail view ── */
  #tagView { display: none; }
  #tagView.visible { display: block; }

  .tag-back-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.82rem;
    color: var(--muted);
    cursor: pointer;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-bottom: 1.5rem;
    background: none;
    border: none;
    padding: 0;
    font-family: var(--body);
  }
  .tag-back-btn:hover { color: var(--accent); }

  /* ── Hero image ── */
  .tag-hero {
    width: 100%;
    height: 240px;
    border-radius: 10px 10px 0 0;
    overflow: hidden;
    position: relative;
    background: var(--faint);
  }
  .tag-hero img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 35%;
    display: block;
    transition: opacity 0.5s;
    opacity: 0;
  }
  .tag-hero img.ready { opacity: 1; }

  /* Shimmer while loading */
  .tag-hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, var(--faint) 25%, var(--border) 50%, var(--faint) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.6s infinite;
    z-index: 0;
  }
  .tag-hero img.ready ~ .tag-hero::before { display: none; }
  @keyframes shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  .tag-hero-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(0,0,0,0.02) 40%,
      rgba(26,24,20,0.65) 100%
    );
    z-index: 1;
  }
  .tag-hero-label {
    position: absolute;
    bottom: 1rem;
    left: 1.2rem;
    font-family: var(--serif);
    font-size: 1.6rem;
    font-weight: 700;
    color: #fff;
    text-shadow: 0 1px 6px rgba(0,0,0,0.6);
    z-index: 2;
  }
  .tag-hero-credit {
    position: absolute;
    bottom: 0.5rem;
    right: 0.8rem;
    font-size: 0.6rem;
    color: rgba(255,255,255,0.4);
    font-style: italic;
    z-index: 2;
  }

  /* ── Panel ── */
  .panel-box {
    background: var(--paper);
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 10px 10px;
    overflow: hidden;
  }
  .panel-heading {
    font-family: var(--serif);
    font-size: 1.1rem;
    font-weight: 500;
    padding: 0.85rem 1.1rem;
    border-bottom: 1px solid var(--faint);
    display: flex;
    align-items: baseline;
    gap: 0.75rem;
  }
  .panel-count {
    font-family: var(--body);
    font-size: 0.82rem;
    color: var(--muted);
    font-weight: 400;
  }

  .comp-list { display: flex; flex-direction: column; }
  .comp-row {
    padding: 0.75rem 1.1rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    text-decoration: none;
    border-bottom: 1px solid var(--faint);
    transition: background 0.12s;
  }
  .comp-row:last-child { border-bottom: none; }
  .comp-row:hover { background: var(--bg); }
  .comp-title { font-family: var(--serif); font-size: 0.95rem; font-weight: 500; color: var(--ink); }
  .comp-meta  { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }
  .comp-icons { display: flex; gap: 0.35rem; flex-shrink: 0; }
  .icon-badge {
    font-size: 0.68rem; padding: 2px 7px; border-radius: 3px;
    border: 1px solid var(--border); color: var(--muted); background: var(--bg);
  }
  .icon-badge.pdf { color: var(--accent);  border-color: var(--accent); }
  .icon-badge.mp3 { color: var(--accent2); border-color: var(--accent2); }

  .loading-state { text-align: center; padding: 2rem; color: var(--muted); font-size: 0.9rem; }
  .empty-state   { color: var(--muted); font-size: 0.9rem; padding: 1.5rem; text-align: center; }
</style>
</head>
<body>

<header class="site-header">
  <a class="back-link" href="index.html">← Back</a>
  <a class="site-name" href="index.html" id="siteNameLink">Norske Musikknoter</a>
</header>

<main>

  <div id="tagsView">
    <h1 class="page-title">🏷 Browse by Tag</h1>
    <p class="page-sub">Select a tag to see all compositions in that category.</p>
    <div id="tagsCloud" class="tags-cloud">
      <div class="loading-state" style="width:100%">Loading tags…</div>
    </div>
  </div>

  <div id="tagView">
    <button class="tag-back-btn" onclick="showTagCloud()">← All tags</button>

    <div class="tag-hero" id="tagHero">
      <img id="tagHeroImg" src="" alt="">
      <div class="tag-hero-overlay"></div>
      <div class="tag-hero-label" id="tagHeroLabel"></div>
      <div class="tag-hero-credit">AI-generated image</div>
    </div>

    <div class="panel-box">
      <div class="panel-heading">
        <span id="panelTagName"></span>
        <span class="panel-count" id="panelCount"></span>
      </div>
      <div id="compList" class="comp-list">
        <div class="loading-state">Loading…</div>
      </div>
    </div>
  </div>

</main>

<script src="config.js"></script>
<script>
document.getElementById('siteNameLink').textContent = SITE_NAME;
const SUPABASE_URL = 'https://tfqnzszyjsdgdeksizel.supabase.co';
const SUPABASE_KEY = 'sb_publishable_TxNG1PKrOD3NuBwCKzEfMA_b3-21kij';
const H = { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` };

// ── Tag → image generation prompt ────────────────────────────────────────────
// Keys matched as lowercase substrings of tag name.
// Style suffix is appended to every prompt for visual consistency.
const STYLE = ', vintage engraving illustration style, muted earthy tones, 1890s Norway aesthetic, wide landscape format, no text';

const TAG_PROMPTS = {
  'polar':              'dramatic arctic expedition Norway 1895, Fram ship in pack ice, aurora borealis, heroic exploration' + STYLE,
  'arktis':             'dramatic arctic expedition Norway 1895, Fram ship in pack ice, aurora borealis' + STYLE,
  'norge 1905':         'Norway independence 1905, jubilant crowds in Christiania, Norwegian flags, historic celebration' + STYLE,
  '1905':               'Norway independence 1905, jubilant crowds in Christiania, Norwegian flags, historic celebration' + STYLE,
  'norsk-amerikansk':   'Norwegian immigrants arriving America 1900, steamship dock, Ellis Island, hopeful emigrants' + STYLE,
  'norsk-american':     'Norwegian immigrants arriving America 1900, steamship dock, hopeful emigrants' + STYLE,
  'norwegian-american': 'Norwegian immigrants arriving America 1900, steamship dock, hopeful emigrants' + STYLE,
  'kongefamilie':       'Norwegian royal family ceremony Oslo 1905, King Haakon VII coronation, grand cathedral' + STYLE,
  'royal':              'Norwegian royal family ceremony Oslo 1905, King Haakon VII coronation, grand cathedral' + STYLE,
  'bergen':             'Bergen Norway harbour 1890s, wooden Hanseatic wharf Bryggen, fishing boats, dramatic mountains' + STYLE,
  'hefte':              'ornate Victorian music salon Norway 1890s, grand piano, sheet music, candlelight' + STYLE,
  'carl warmuth':       'elegant Norwegian music publisher office 1890s, stacked sheet music, printing press' + STYLE,
  'folk':               'Norwegian folk musicians playing Hardanger fiddle, mountain valley, traditional bunad costumes' + STYLE,
  'church':             'medieval Norwegian stave church Borgund, misty forest, dramatic sky' + STYLE,
  'hymn':               'Norwegian church interior 1890s, pipe organ, congregation, winter light through windows' + STYLE,
  'grieg':              'Edvard Grieg composing at piano, Troldhaugen villa Bergen, Norwegian fjord view' + STYLE,
  'national':           'majestic Norwegian mountain landscape Jotunheimen, romantic nationalism painting style' + STYLE,
  'march':              'Norwegian military parade Christiania 1900, brass band, cobblestone street, national day' + STYLE,
  'waltz':              'elegant ballroom Norway 1890s, couples dancing waltz, chandelier, formal dress' + STYLE,
  'dance':              'Norwegian Halling folk dance celebration, village square, fiddle player, midsummer' + STYLE,
  'children':           'Norwegian children playing outdoors 1900, snow, traditional clothing, winter landscape' + STYLE,
  'christmas':          'Norwegian Christmas Eve 1890s, candlelit tree, family gathering, snow outside window' + STYLE,
  'sea':                'Norwegian fishing village fjord 1890s, wooden boats, dramatic cliffs, northern light' + STYLE,
  'mountain':           'Norwegian mountain Jotunheimen peaks, hikers 1890s, romantic sublime landscape' + STYLE,
  'piano':              'Victorian concert hall Norway 1890s, grand piano on stage, attentive audience, gaslight' + STYLE,
  'violin':             'Ole Bull Norwegian violinist concert, dramatic stage lighting, romantic era' + STYLE,
  'opera':              'Norwegian opera performance 1890s, ornate theatre, costumed singers, audience' + STYLE,
  'serenade':           'evening garden serenade Norway 1890s, moonlight, string quartet, summer terrace' + STYLE,
  'lullaby':            'Norwegian mother singing lullaby to child, cozy timber farmhouse interior, candlelight' + STYLE,
  'patriotic':          'Norway national day 17 May 1900, children procession, flags, Christiania street' + STYLE,
};

// Default prompt for unmatched tags
const DEFAULT_PROMPT = 'Norwegian music score concert hall 1890s, ornate Victorian interior, sheet music, candlelight' + STYLE;

function getPrompt(tagName) {
  const lower = tagName.toLowerCase();
  if (TAG_PROMPTS[lower]) return TAG_PROMPTS[lower];
  for (const [key, prompt] of Object.entries(TAG_PROMPTS)) {
    if (lower.includes(key)) return prompt;
  }
  return DEFAULT_PROMPT;
}

function pollinationsUrl(prompt) {
  // seed derived from prompt for stable/consistent image on repeated loads
  const seed = prompt.split('').reduce((a, c) => (a * 31 + c.charCodeAt(0)) & 0xfffffff, 0);
  return `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?width=1200&height=400&seed=${seed}&nologo=true`;
}

// ── Hero image ────────────────────────────────────────────────────────────────
function loadHeroImage(tagName) {
  const img   = document.getElementById('tagHeroImg');
  const label = document.getElementById('tagHeroLabel');

  img.classList.remove('ready');
  label.textContent = tagName;

  const url = pollinationsUrl(getPrompt(tagName));

  img.onload  = () => img.classList.add('ready');
  img.onerror = () => { /* keep shimmer, no crash */ };
  img.src = url;
  img.alt = tagName;
}

// ── View switching ────────────────────────────────────────────────────────────
function showTagCloud() {
  document.getElementById('tagsView').classList.remove('hidden');
  document.getElementById('tagView').classList.remove('visible');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showTagDetail() {
  document.getElementById('tagsView').classList.add('hidden');
  document.getElementById('tagView').classList.add('visible');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── Tags ──────────────────────────────────────────────────────────────────────
let allTags = [];

async function loadTags() {
  const r = await fetch(
    `${SUPABASE_URL}/rest/v1/tag?select=tag_id,tag_name&order=tag_name.asc`,
    { headers: H }
  );
  allTags = await r.json();

  const ctR = await fetch(`${SUPABASE_URL}/rest/v1/composition_tag?select=tag_id`, { headers: H });
  const countMap = {};
  (await ctR.json()).forEach(row => {
    countMap[row.tag_id] = (countMap[row.tag_id] || 0) + 1;
  });

  const cloud = document.getElementById('tagsCloud');
  if (!allTags.length) {
    cloud.innerHTML = '<div class="empty-state">No tags found.</div>';
    return;
  }

  cloud.innerHTML = allTags.map(t => `
    <div class="tag-pill" id="tag-pill-${t.tag_id}"
         onclick="selectTag(${t.tag_id}, '${t.tag_name.replace(/'/g, "\\'")}')">
      ${t.tag_name}
      <span class="tag-count">${countMap[t.tag_id] || 0}</span>
    </div>
  `).join('');

  const preTag = new URLSearchParams(window.location.search).get('tag');
  if (preTag) {
    const match = allTags.find(t => t.tag_id == preTag);
    if (match) selectTag(match.tag_id, match.tag_name);
  }
}

// ── Select tag ────────────────────────────────────────────────────────────────
async function selectTag(tagId, tagName) {
  document.getElementById('panelTagName').textContent = tagName;
  document.getElementById('panelCount').textContent = '';
  document.getElementById('compList').innerHTML = '<div class="loading-state">Loading…</div>';
  showTagDetail();
  loadHeroImage(tagName);

  const ctR = await fetch(
    `${SUPABASE_URL}/rest/v1/composition_tag?tag_id=eq.${tagId}&select=composition_id`,
    { headers: H }
  );
  const ctRows = await ctR.json();

  if (!ctRows.length) {
    document.getElementById('compList').innerHTML = '<div class="empty-state">No compositions with this tag.</div>';
    document.getElementById('panelCount').textContent = '0 compositions';
    return;
  }

  const compIds = ctRows.map(r => r.composition_id).join(',');

  const [compR, scoreR, ccR] = await Promise.all([
    fetch(`${SUPABASE_URL}/rest/v1/composition?composition_id=in.(${compIds})&public_domain=eq.Yes&musescore_link=not.is.null&select=composition_id,title,year_composed,musescore_link,public_domain&order=title.asc`, { headers: H }),
    fetch(`${SUPABASE_URL}/rest/v1/score?composition_id=in.(${compIds})&select=composition_id,pdf_url,mp3_url`, { headers: H }),
    fetch(`${SUPABASE_URL}/rest/v1/composition_person?composition_id=in.(${compIds})&role=eq.Composer&select=composition_id,person_id`, { headers: H }),
  ]);

  const comps  = await compR.json();
  const scores = await scoreR.json();
  const ccRows = await ccR.json();

  const personIds = [...new Set(ccRows.map(r => r.person_id))];
  let persons = [];
  for (let i = 0; i < personIds.length; i += 200) {
    const chunk = personIds.slice(i, i + 200).join(',');
    const pR = await fetch(
      `${SUPABASE_URL}/rest/v1/person?person_id=in.(${chunk})&select=person_id,first_name,last_name`,
      { headers: H }
    );
    persons = persons.concat(await pR.json());
  }

  const personMap = Object.fromEntries(persons.map(p => [p.person_id, p]));
  const ccMap = {};
  ccRows.forEach(row => {
    if (!ccMap[row.composition_id]) ccMap[row.composition_id] = [];
    const p = personMap[row.person_id];
    if (p) ccMap[row.composition_id].push(`${p.first_name || ''} ${p.last_name || ''}`.trim());
  });

  const scoreMap = {};
  scores.forEach(s => { scoreMap[s.composition_id] = s; });

  document.getElementById('panelCount').textContent =
    `${comps.length} composition${comps.length !== 1 ? 's' : ''}`;

  document.getElementById('compList').innerHTML = comps.length
    ? comps.map(comp => {
        const s = scoreMap[comp.composition_id];
        const composers = (ccMap[comp.composition_id] || []).join(', ') || '—';
        return `
          <a class="comp-row" href="score.html?id=${comp.composition_id}">
            <div>
              <div class="comp-title">${comp.title}</div>
              <div class="comp-meta">${composers}${comp.year_composed ? ' · ' + comp.year_composed : ''}</div>
            </div>
            <div class="comp-icons">
              ${s?.pdf_url ? '<span class="icon-badge pdf">PDF</span>' : ''}
              ${s?.mp3_url ? '<span class="icon-badge mp3">MP3</span>' : ''}
              ${comp.musescore_link ? '<span class="icon-badge">♪</span>' : ''}
              ${comp.public_domain === 'Yes' ? '<span class="icon-badge" style="color:var(--accent2);border-color:var(--accent2)">PD</span>' : ''}
            </div>
          </a>`;
      }).join('')
    : '<div class="empty-state">No public domain scores found for this tag.</div>';
}

loadTags();
</script>
</body>
</html>
