<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tags — Norske Musikknoter</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400&family=Source+Serif+4:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #f7f4ee;
    --paper:   #fffef9;
    --ink:     #1a1814;
    --muted:   #7a7060;
    --faint:   #e8e2d4;
    --accent:  #8b3a1e;
    --accent2: #2a5c45;
    --border:  #d4cdc0;
    --serif:   'Playfair Display', Georgia, serif;
    --body:    'Source Serif 4', Georgia, serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--body); background: var(--bg); color: var(--ink); min-height: 100vh; }

  .site-header {
    background: var(--paper);
    border-bottom: 1px solid var(--border);
    padding: 1rem 2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
  }
  .back-link {
    font-size: 0.82rem; color: var(--muted); text-decoration: none;
    letter-spacing: 0.05em; text-transform: uppercase;
  }
  .back-link:hover { color: var(--accent); }
  .site-name {
    font-family: var(--serif); font-size: 1rem; font-weight: 500;
    color: var(--ink); text-decoration: none;
  }

  /* ── Mode switch (Public Domain / Copyright) ── */
  .mode-switch-wrap {
    display: inline-flex;
    align-items: center;
    gap: 0.6rem;
    margin-left: auto;
  }
  .mode-switch-label {
    font-size: 0.76rem;
    letter-spacing: 0.04em;
    color: var(--muted);
    cursor: pointer;
    transition: color 0.15s, font-weight 0.15s;
  }
  .mode-switch-label.active { color: var(--accent); font-weight: 600; }
  .mode-switch {
    position: relative;
    display: inline-block;
    width: 38px;
    height: 20px;
  }
  .mode-switch input { opacity: 0; width: 0; height: 0; }
  .mode-switch-slider {
    position: absolute; cursor: pointer;
    top: 0; left: 0; right: 0; bottom: 0;
    background: var(--border);
    border-radius: 20px;
    transition: background 0.15s;
  }
  .mode-switch-slider::before {
    content: '';
    position: absolute;
    height: 14px; width: 14px;
    left: 3px; bottom: 3px;
    background: #fff;
    border-radius: 50%;
    transition: transform 0.15s;
  }
  .mode-switch input:checked + .mode-switch-slider { background: var(--accent); }
  .mode-switch input:checked + .mode-switch-slider::before { transform: translateX(18px); }

  main { max-width: 860px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

  .page-title {
    font-family: var(--serif);
    font-size: clamp(1.4rem, 3vw, 2rem);
    font-weight: 700;
    margin-bottom: 0.4rem;
  }
  .page-sub { font-size: 0.88rem; color: var(--muted); margin-bottom: 2rem; }

  #tagsView { display: block; }
  #tagsView.hidden { display: none; }

  .tags-cloud {
    display: flex;
    flex-wrap: wrap;
    gap: 0.6rem;
  }
  .tag-pill {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    padding: 6px 14px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: var(--paper);
    font-size: 0.85rem;
    color: var(--ink);
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
    user-select: none;
  }
  .tag-pill:hover { border-color: var(--accent2); color: var(--accent2); }
  .tag-count { font-size: 0.72rem; opacity: 0.7; }

  #tagView { display: none; }
  #tagView.visible { display: block; }

  .tag-back-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.82rem;
    color: var(--muted);
    cursor: pointer;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-bottom: 1.5rem;
    background: none;
    border: none;
    padding: 0;
    font-family: var(--body);
  }
  .tag-back-btn:hover { color: var(--accent); }

  .tag-hero {
    width: 100%;
    height: 360px;
    border-radius: 10px 10px 0 0;
    overflow: hidden;
    position: relative;
    background: #2a2620;
  }
  .tag-hero.loaded { background: #333; }

  .tag-hero img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 60%;
    display: block;
    position: relative;
    z-index: 1;
    transition: opacity 0.5s;
    opacity: 0;
  }
  .tag-hero.loaded img { opacity: 1; }

  .tag-hero-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, rgba(0,0,0,0.02) 40%, rgba(26,24,20,0.65) 100%);
    z-index: 2;
  }
  .tag-hero-label {
    position: absolute;
    bottom: 1rem;
    left: 1.2rem;
    font-family: var(--serif);
    font-size: 1.6rem;
    font-weight: 700;
    color: #fff;
    text-shadow: 0 1px 6px rgba(0,0,0,0.6);
    z-index: 3;
  }

  .panel-box {
    background: var(--paper);
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 10px 10px;
    overflow: hidden;
  }
  .panel-heading {
    font-family: var(--serif);
    font-size: 1.1rem;
    font-weight: 500;
    padding: 0.85rem 1.1rem;
    border-bottom: 1px solid var(--faint);
    display: flex;
    align-items: baseline;
    gap: 0.75rem;
  }
  .panel-count {
    font-family: var(--body);
    font-size: 0.82rem;
    color: var(--muted);
    font-weight: 400;
  }

  .comp-list { display: flex; flex-direction: column; }
  .comp-row {
    padding: 0.75rem 1.1rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    text-decoration: none;
    border-bottom: 1px solid var(--faint);
    transition: background 0.12s;
  }
  .comp-row:last-child { border-bottom: none; }
  .comp-row:hover { background: var(--bg); }
  .comp-title { font-family: var(--serif); font-size: 0.95rem; font-weight: 500; color: var(--ink); }
  .comp-meta  { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }
  .comp-icons { display: flex; gap: 0.35rem; flex-shrink: 0; align-items: center; }
  .icon-badge {
    font-size: 0.68rem; padding: 2px 7px; border-radius: 3px;
    border: 1px solid var(--border); color: var(--muted); background: var(--bg);
  }
  .icon-badge.pdf { color: var(--accent);  border-color: var(--accent); }
  .icon-badge.mp3 { color: var(--accent2); border-color: var(--accent2); }
  .ms-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
  .ms-dot.ms-low  { background: #aaa49c; }
  .ms-dot.ms-med  { background: #3a6ea8; }
  .ms-dot.ms-high { background: #cc2200; }

  .loading-state { text-align: center; padding: 2rem; color: var(--muted); font-size: 0.9rem; }
  .empty-state   { color: var(--muted); font-size: 0.9rem; padding: 1.5rem; text-align: center; }
</style>
</head>
<body>

<header class="site-header">
  <a class="back-link" href="index.html" id="backLink">← Back</a>
  <a class="site-name" href="index.html" id="siteNameLink">Norske Musikknoter</a>

  <div class="mode-switch-wrap" title="Switch between public domain and copyright-protected scores">
    <span class="mode-switch-label active" id="modeLabelPD" onclick="switchSiteMode('pd')">Public Domain</span>
    <label class="mode-switch">
      <input type="checkbox" id="modeToggle" onchange="switchSiteMode(this.checked ? 'copyright' : 'pd')">
      <span class="mode-switch-slider"></span>
    </label>
    <span class="mode-switch-label" id="modeLabelCopyright" onclick="switchSiteMode('copyright')">Copyright</span>
  </div>
</header>

<main>

  <div id="tagsView">
    <h1 class="page-title">🏷 Browse by Tag</h1>
    <p class="page-sub">Select a tag to see all compositions in that category.</p>
    <div id="tagsCloud" class="tags-cloud">
      <div class="loading-state" style="width:100%">Loading tags…</div>
    </div>
  </div>

  <div id="tagView">
    <button class="tag-back-btn" onclick="showTagCloud()">← All tags</button>

    <div class="tag-hero" id="tagHero">
      <img id="tagHeroImg" src="" alt="">
      <div class="tag-hero-overlay"></div>
      <div class="tag-hero-label" id="tagHeroLabel"></div>
    </div>

    <div class="panel-box">
      <div class="panel-heading">
        <span id="panelTagName"></span>
        <span class="panel-count" id="panelCount"></span>
      </div>
      <div id="compList" class="comp-list">
        <div class="loading-state">Loading…</div>
      </div>
    </div>
  </div>

</main>

<script src="config.js"></script>
<script>
document.getElementById('siteNameLink').textContent = SITE_NAME;
const SUPABASE_URL = 'https://tfqnzszyjsdgdeksizel.supabase.co';
const SUPABASE_KEY = 'sb_publishable_TxNG1PKrOD3NuBwCKzEfMA_b3-21kij';
const H = { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` };

// ── Site mode: 'pd' (public domain) or 'copyright' ─────────────────────────────
let siteMode = new URLSearchParams(window.location.search).get('mode') === 'copyright' ? 'copyright' : 'pd';
document.getElementById('modeToggle').checked = (siteMode === 'copyright');
document.getElementById('modeLabelPD').classList.toggle('active', siteMode === 'pd');
document.getElementById('modeLabelCopyright').classList.toggle('active', siteMode === 'copyright');
function syncIndexLinks() {
  const href = 'index.html' + (siteMode === 'copyright' ? '?mode=copyright' : '');
  document.getElementById('backLink').href = href;
  document.getElementById('siteNameLink').href = href;
}
syncIndexLinks();
function scoreHref(id) {
  return (siteMode === 'copyright' ? 'score-copyright.html' : 'score.html') + '?id=' + id;
}

function wordCount(text) {
  if (!text || !text.trim()) return 0;
  return text.trim().split(/\s+/).length;
}

function msInfoBadge(notes) {
  const wc = wordCount(notes);
  if (wc === 0)  return '<span class="ms-dot ms-low" style="visibility:hidden"></span>';
  if (wc <= 100) return '<span class="ms-dot ms-low"  title="MuseScore info: ~' + wc + ' words"></span>';
  if (wc <= 300) return '<span class="ms-dot ms-med"  title="MuseScore info: ~' + wc + ' words"></span>';
                 return '<span class="ms-dot ms-high" title="MuseScore info: ~' + wc + ' words"></span>';
}

function loadHeroImage(tagName, imageUrl) {
  const hero  = document.getElementById('tagHero');
  const img   = document.getElementById('tagHeroImg');
  const label = document.getElementById('tagHeroLabel');

  hero.classList.remove('loaded');
  label.textContent = tagName;

  if (!imageUrl) return;

  img.onload  = () => hero.classList.add('loaded');
  img.onerror = () => hero.classList.remove('loaded');
  img.src = imageUrl;
  img.alt = tagName;
}

function showTagCloud() {
  document.getElementById('tagsView').classList.remove('hidden');
  document.getElementById('tagView').classList.remove('visible');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showTagDetail() {
  document.getElementById('tagsView').classList.add('hidden');
  document.getElementById('tagView').classList.add('visible');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

let allTags = [];

async function loadTags() {
  const cloud = document.getElementById('tagsCloud');
  cloud.innerHTML = '<div class="loading-state" style="width:100%">Loading tags…</div>';

  const r = await fetch(
    `${SUPABASE_URL}/rest/v1/tag?select=tag_id,tag_name,image_url&order=tag_name.asc`,
    { headers: H }
  );
  allTags = await r.json();
  const HIDDEN_TAGS = ['Music for the Norwegian Royal Family'];
  allTags = allTags.filter(t => !HIDDEN_TAGS.includes(t.tag_name));

  const pdFilter = siteMode === 'copyright' ? 'neq.Yes' : 'eq.Yes';
  const [ctR, pdR] = await Promise.all([
    fetch(`${SUPABASE_URL}/rest/v1/composition_tag?select=tag_id,composition_id`, { headers: H }),
    fetch(`${SUPABASE_URL}/rest/v1/composition?public_domain=${pdFilter}&musescore_link=not.is.null&select=composition_id`, { headers: H }),
  ]);
  const pdIds = new Set((await pdR.json()).map(r => r.composition_id));
  const countMap = {};
  (await ctR.json()).forEach(row => {
    if (pdIds.has(row.composition_id))
      countMap[row.tag_id] = (countMap[row.tag_id] || 0) + 1;
  });

  // Only show tags that have at least one composition in the current mode
  const visibleTags = allTags.filter(t => (countMap[t.tag_id] || 0) > 0);

  if (!visibleTags.length) {
    cloud.innerHTML = '<div class="empty-state">No tags found for ' + (siteMode === 'copyright' ? 'copyright' : 'public domain') + ' scores.</div>';
    return;
  }

  cloud.innerHTML = visibleTags.map(t => `
    <div class="tag-pill" id="tag-pill-${t.tag_id}"
         onclick="selectTag(${t.tag_id}, '${t.tag_name.replace(/'/g, "\\'")}', '${(t.image_url||'').replace(/'/g, "\\'")}')">
      ${t.tag_name}
      <span class="tag-count">${countMap[t.tag_id] || 0}</span>
    </div>
  `).join('');

  const preTag = new URLSearchParams(window.location.search).get('tag');
  if (preTag) {
    const match = visibleTags.find(t => t.tag_id == preTag);
    if (match) selectTag(match.tag_id, match.tag_name, match.image_url || '');
  }
}

async function selectTag(tagId, tagName, imageUrl) {
  document.getElementById('panelTagName').textContent = tagName;
  document.getElementById('panelCount').textContent = '';
  document.getElementById('compList').innerHTML = '<div class="loading-state">Loading…</div>';
  showTagDetail();
  loadHeroImage(tagName, imageUrl || '');

  const ctR = await fetch(
    `${SUPABASE_URL}/rest/v1/composition_tag?tag_id=eq.${tagId}&select=composition_id`,
    { headers: H }
  );
  const ctRows = await ctR.json();

  if (!ctRows.length) {
    document.getElementById('compList').innerHTML = '<div class="empty-state">No compositions with this tag.</div>';
    document.getElementById('panelCount').textContent = '0';
    return;
  }

  const compIds = ctRows.map(r => r.composition_id).join(',');
  const pdFilter = siteMode === 'copyright' ? 'neq.Yes' : 'eq.Yes';

  const [compR, scoreR, ccR] = await Promise.all([
    fetch(`${SUPABASE_URL}/rest/v1/composition?composition_id=in.(${compIds})&public_domain=${pdFilter}&musescore_link=not.is.null&select=composition_id,title,year_composed,musescore_link,public_domain,musescore_notes&order=title.asc`, { headers: H }),
    fetch(`${SUPABASE_URL}/rest/v1/score?composition_id=in.(${compIds})&select=composition_id,pdf_url,mp3_url`, { headers: H }),
    fetch(`${SUPABASE_URL}/rest/v1/composition_person?composition_id=in.(${compIds})&role=eq.Composer&select=composition_id,person_id`, { headers: H }),
  ]);

  const comps  = await compR.json();
  const scores = await scoreR.json();
  const ccRows = await ccR.json();

  const personIds = [...new Set(ccRows.map(r => r.person_id))];
  let persons = [];
  for (let i = 0; i < personIds.length; i += 200) {
    const chunk = personIds.slice(i, i + 200).join(',');
    const pR = await fetch(
      `${SUPABASE_URL}/rest/v1/person?person_id=in.(${chunk})&select=person_id,first_name,last_name`,
      { headers: H }
    );
    persons = persons.concat(await pR.json());
  }

  const personMap = Object.fromEntries(persons.map(p => [p.person_id, p]));
  const ccMap = {};
  ccRows.forEach(row => {
    if (!ccMap[row.composition_id]) ccMap[row.composition_id] = [];
    const p = personMap[row.person_id];
    if (p) ccMap[row.composition_id].push(`${p.first_name || ''} ${p.last_name || ''}`.trim());
  });

  const scoreMap = {};
  scores.forEach(s => { scoreMap[s.composition_id] = s; });

  document.getElementById('panelCount').textContent = comps.length;

  document.getElementById('compList').innerHTML = comps.length
    ? comps.map(comp => {
        const s = scoreMap[comp.composition_id];
        const composers = (ccMap[comp.composition_id] || []).join(', ') || '—';
        return `
          <a class="comp-row" href="${scoreHref(comp.composition_id)}">
            <div>
              <div class="comp-title">${comp.title}</div>
              <div class="comp-meta">${composers}${comp.year_composed ? ' · ' + comp.year_composed : ''}</div>
            </div>
            <div class="comp-icons">
              ${s?.pdf_url ? '<span class="icon-badge pdf">PDF</span>' : ''}
              ${s?.mp3_url ? '<span class="icon-badge mp3">MP3</span>' : ''}
              ${comp.musescore_link ? '<span class="icon-badge">♪</span>' : ''}
              ${comp.public_domain === 'Yes' ? '<span class="icon-badge" style="color:var(--accent2);border-color:var(--accent2)">PD</span>' : ''}
              ${msInfoBadge(comp.musescore_notes)}
            </div>
          </a>`;
      }).join('')
    : '<div class="empty-state">No scores found for this tag.</div>';
}

// ── Mode switch ───────────────────────────────────────────────────────────────
function switchSiteMode(mode) {
  if (mode === siteMode) return;
  siteMode = mode;

  document.getElementById('modeToggle').checked = (mode === 'copyright');
  document.getElementById('modeLabelPD').classList.toggle('active', mode === 'pd');
  document.getElementById('modeLabelCopyright').classList.toggle('active', mode === 'copyright');
  syncIndexLinks();

  showTagCloud();
  loadTags();
}

loadTags();
</script>
</body>
</html>
