<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reidar Thommessen – Komposisjoner</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Source+Serif+4:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#faf8f4;
  --surface:#ffffff;
  --border:#e2ddd5;
  --border-dark:#c8c0b0;
  --gold:#8b6c2e;
  --gold-lt:#b8923f;
  --text:#1e1a14;
  --muted:#6b6050;
  --link:#5a3e10;
  --tag-bg:#f0ebe0;
  --green:#2d6a35;
  --red:#8b2020;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Source Serif 4',Georgia,serif;font-size:17px;line-height:1.65;min-height:100vh}

/* ── HEADER ── */
header{
  background:var(--surface);
  border-bottom:2px solid var(--border-dark);
  padding:56px 40px 48px;
  position:relative;
}
header::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:repeating-linear-gradient(90deg,var(--gold) 0 10px,transparent 10px 16px);
}
.header-inner{max-width:860px;margin:0 auto}
.eyebrow{
  font-family:'Source Serif 4',serif;font-size:0.65rem;letter-spacing:0.28em;
  text-transform:uppercase;color:var(--gold);margin-bottom:16px;
}
h1{
  font-family:'Playfair Display',serif;font-size:clamp(2rem,5vw,3.4rem);
  font-weight:700;line-height:1.1;color:var(--text);
}
.dates{
  font-family:'Source Serif 4',serif;font-style:italic;font-size:1rem;
  color:var(--muted);margin-top:8px;
}
.rule{width:60px;height:2px;background:var(--gold);margin:20px 0}
.bio{font-size:0.95rem;line-height:1.75;color:var(--text);max-width:620px}
.bio-links{margin-top:18px;display:flex;flex-wrap:wrap;gap:8px}
.bio-links a{
  font-family:'Source Serif 4',serif;font-size:0.72rem;letter-spacing:0.1em;
  text-transform:uppercase;color:var(--link);text-decoration:none;
  border:1px solid var(--border-dark);padding:5px 14px;background:var(--tag-bg);
  transition:background .18s,border-color .18s;
}
.bio-links a:hover{background:var(--gold);color:#fff;border-color:var(--gold)}
.pills{margin-top:14px;display:flex;gap:8px;flex-wrap:wrap}
.pill{
  font-size:0.65rem;letter-spacing:0.12em;text-transform:uppercase;
  color:var(--gold);border:1px solid var(--gold);padding:2px 10px;
  border-radius:2px;
}

/* ── MAIN ── */
main{max-width:860px;margin:0 auto;padding:44px 40px 90px}
.sec-head{display:flex;align-items:center;gap:14px;margin-bottom:24px}
.sec-label{
  font-family:'Source Serif 4',serif;font-size:0.65rem;letter-spacing:0.22em;
  text-transform:uppercase;color:var(--gold);white-space:nowrap;
}
.sec-line{flex:1;height:1px;background:var(--border-dark)}
.sec-count{
  font-size:0.65rem;letter-spacing:0.12em;color:var(--muted);white-space:nowrap;
}

/* ── TABLE ── */
table{width:100%;border-collapse:collapse;font-size:0.94rem}
thead tr{border-bottom:2px solid var(--border-dark)}
th{
  font-family:'Source Serif 4',serif;font-size:0.62rem;letter-spacing:0.16em;
  text-transform:uppercase;color:var(--muted);font-weight:400;
  padding:0 14px 12px 0;text-align:left;white-space:nowrap;
}
th:last-child{padding-right:0}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:hover{background:#f5f1ea}
td{padding:13px 14px 13px 0;vertical-align:top}
td:last-child{padding-right:0}

.td-num{
  font-size:0.7rem;color:var(--border-dark);width:28px;
  padding-top:15px;font-variant-numeric:tabular-nums;
}
.td-title{
  font-family:'Playfair Display',serif;font-style:italic;
  font-size:1rem;color:var(--text);line-height:1.3;
}
.td-notes{
  font-family:'Source Serif 4',serif;font-size:0.78rem;
  color:var(--muted);margin-top:3px;font-style:normal;line-height:1.4;
}
.td-year{
  font-size:0.85rem;color:var(--muted);white-space:nowrap;
  padding-top:15px;font-variant-numeric:tabular-nums;
}
.td-lyricist{font-size:0.88rem;color:var(--muted);font-style:italic}
.td-lyricist a{color:var(--link);text-decoration:none;border-bottom:1px solid var(--border-dark)}
.td-lyricist a:hover{color:var(--gold);border-color:var(--gold)}
.td-pd{white-space:nowrap;font-size:0.75rem;padding-top:14px}
.pd-y{color:var(--green);font-weight:400}
.pd-n{color:var(--red)}
.pd-u{color:var(--muted)}
.td-links{white-space:nowrap;padding-top:10px}

.btn-link{
  display:inline-flex;align-items:center;gap:5px;
  font-family:'Source Serif 4',serif;font-size:0.7rem;letter-spacing:0.06em;
  text-transform:uppercase;color:var(--link);text-decoration:none;
  border:1px solid var(--border-dark);padding:4px 10px;
  background:var(--tag-bg);transition:background .15s,color .15s,border-color .15s;
  margin-right:4px;
}
.btn-link:hover{background:var(--gold);color:#fff;border-color:var(--gold)}
.btn-link svg{width:12px;height:12px;fill:currentColor;flex-shrink:0}

/* ── STATUS / ERROR ── */
#status{padding:70px 0;text-align:center;font-style:italic;color:var(--muted);font-size:1rem}
.spin{
  display:inline-block;width:16px;height:16px;
  border:2px solid var(--border);border-top-color:var(--gold);
  border-radius:50%;animation:spin .75s linear infinite;
  vertical-align:middle;margin-right:8px;
}
@keyframes spin{to{transform:rotate(360deg)}}
.err{
  background:#fff5f5;border:1px solid #e0b0b0;border-radius:4px;
  padding:20px;color:#8b2020;font-family:monospace;font-size:0.8rem;
  white-space:pre-wrap;word-break:break-all;margin-top:12px;display:none;
}

/* ── FOOTER ── */
footer{
  text-align:center;padding:28px;font-size:0.72rem;letter-spacing:0.12em;
  text-transform:uppercase;color:var(--muted);border-top:1px solid var(--border-dark);
  background:var(--surface);
}

@media(max-width:640px){
  header,main{padding-left:18px;padding-right:18px}
  .hide-sm{display:none}
  h1{font-size:1.9rem}
}
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <div class="eyebrow">Norsk musikk-katalog · Komponist</div>
    <h1 id="name">Reidar Thommessen</h1>
    <div class="dates" id="dates"></div>
    <div class="rule"></div>
    <p class="bio" id="bio"></p>
    <div class="bio-links" id="biolinks"></div>
    <div class="pills" id="pills"></div>
  </div>
</header>

<main>
  <div class="sec-head" id="sechead" style="display:none">
    <span class="sec-label">Komposisjoner</span>
    <span class="sec-line"></span>
    <span class="sec-count" id="count"></span>
  </div>
  <div id="status"><span class="spin"></span> Henter data…</div>
  <div class="err" id="err"></div>
  <div id="tablewrap" style="display:none">
    <table>
      <thead><tr>
        <th style="width:28px">#</th>
        <th>Tittel</th>
        <th class="hide-sm">År</th>
        <th class="hide-sm">Tekstforfatter</th>
        <th>PD</th>
        <th>Lenker</th>
      </tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</main>

<footer>Historiske norske og nordiske komposisjoner</footer>

<script>
const B='https://tfqnzszyjsdgdeksizel.supabase.co/rest/v1';
const K='sb_publishable_TxNG1PKrOD3NuBwCKzEfMA_b3-21kij';
const H={apikey:K,Authorization:'Bearer '+K};

function $id(id){return document.getElementById(id)}
function fail(msg){$id('status').textContent='⚠ Noe gikk galt';const e=$id('err');e.style.display='block';e.textContent=msg}
async function get(path){const r=await fetch(B+path,{headers:H});if(!r.ok)throw new Error('HTTP '+r.status+'\n'+await r.text());return r.json()}

function urlLabel(url){
  if(/wikipedia/i.test(url))return'Wikipedia';
  if(/nb\.no/.test(url))return'nb.no';
  if(/nbl\.snl/.test(url))return'NBL/SNL';
  if(/snl\.no/.test(url))return'SNL';
  if(/musescore/.test(url))return'MuseScore';
  try{return new URL(url).hostname.replace('www.','')}catch{return url}
}

const ICON_MS=`<svg viewBox="0 0 24 24"><path d="M12 3C7 3 3 7 3 12s4 9 9 9 9-4 9-9-4-9-9-9zm0 16.5c-4.1 0-7.5-3.4-7.5-7.5S7.9 4.5 12 4.5s7.5 3.4 7.5 7.5-3.4 7.5-7.5 7.5zM11 7h2v5.4l3.8 2.3-.9 1.5-4.9-3V7z"/></svg>`;
const ICON_LK=`<svg viewBox="0 0 24 24"><path d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z"/></svg>`;

(async()=>{
try{
  // 1. Person
  const persons=await get('/person?last_name=ilike.*thommessen*&select=*');
  if(!persons.length){fail('Ingen komponist funnet med etternavnet Thommessen.');return}
  const p=persons.find(x=>x.first_name?.toLowerCase().includes('reidar'))||persons[0];

  // Header
  const fullName=[p.first_name,p.last_name].filter(Boolean).join(' ');
  $id('name').textContent=fullName;
  document.title=fullName+' – Komposisjoner';

  const b=p.born?String(p.born)+(p.born_uncertain==='yes'?'?':''):null;
  const d=p.died?String(p.died)+(p.died_uncertain==='yes'?'?':''):null;
  if(b||d)$id('dates').textContent=(b||'?')+' – '+(d||'');

  if(p.bio_text?.trim()){
    const t=p.bio_text.trim();
    $id('bio').textContent=t.length>700?t.slice(0,700)+'…':t;
  }

  if(p.bio_url?.trim()){
    const el=$id('biolinks');
    p.bio_url.split(/[\n,;]+/).map(s=>s.trim()).filter(s=>s.startsWith('http')).forEach(url=>{
      const a=document.createElement('a');
      a.href=url;a.target='_blank';a.rel='noopener';
      a.textContent=urlLabel(url);el.appendChild(a);
    });
  }

  const pillsEl=$id('pills');
  [p.nationality,p.gender==='F'?'Kvinne':p.gender==='M'?'Mann':null]
    .filter(Boolean).forEach(v=>{
      const s=document.createElement('span');s.className='pill';s.textContent=v;
      pillsEl.appendChild(s);
    });

  // 2. Compositions
  const junctions=await get('/composition_composer?person_id=eq.'+p.person_id+'&select=composition_id');
  if(!junctions.length){fail('Ingen komposisjoner funnet.');return}
  const ids=junctions.map(j=>j.composition_id);
  const comps=await get('/composition?composition_id=in.('+ids+')&order=title.asc&select=*');

  // 3. Lyricists
  const llinks=await get('/composition_lyricist?composition_id=in.('+ids+')&select=composition_id,person_id');
  const lpids=[...new Set(llinks.map(l=>l.person_id))];
  let lpersons=[];
  if(lpids.length)lpersons=await get('/person?person_id=in.('+lpids+')&select=person_id,first_name,last_name,bio_url');

  const pById={};lpersons.forEach(x=>{pById[x.person_id]=x});
  const lByComp={};
  llinks.forEach(l=>{
    const x=pById[l.person_id];if(!x)return;
    if(!lByComp[l.composition_id])lByComp[l.composition_id]=[];
    lByComp[l.composition_id].push(x);
  });

  // Render
  $id('status').style.display='none';
  $id('sechead').style.display='flex';
  $id('count').textContent=comps.length+' verk';
  $id('tablewrap').style.display='block';

  const tbody=$id('tbody');
  comps.forEach((c,i)=>{
    const tr=document.createElement('tr');

    // #
    const tdN=document.createElement('td');tdN.className='td-num';
    tdN.textContent=String(i+1).padStart(2,'0');

    // Title + notes
    const tdT=document.createElement('td');
    const divT=document.createElement('div');divT.className='td-title';
    divT.textContent=c.title||'–';tdT.appendChild(divT);
    if(c.composition_notes?.trim()){
      const dn=document.createElement('div');dn.className='td-notes';
      const n=c.composition_notes.trim();
      dn.textContent=n.length>140?n.slice(0,140)+'…':n;
      tdT.appendChild(dn);
    }

    // Year
    const tdY=document.createElement('td');tdY.className='td-year hide-sm';
    tdY.textContent=c.year_composed||'';

    // Lyricist with link if bio_url exists
    const tdL=document.createElement('td');tdL.className='td-lyricist hide-sm';
    const lyrs=lByComp[c.composition_id]||[];
    lyrs.forEach((lyr,li)=>{
      if(li>0){const comma=document.createTextNode(', ');tdL.appendChild(comma)}
      const bioUrls=lyr.bio_url?.split(/[\n,;]+/).map(s=>s.trim()).filter(s=>s.startsWith('http'))||[];
      if(bioUrls.length){
        const a=document.createElement('a');
        a.href=bioUrls[0];a.target='_blank';a.rel='noopener';
        a.textContent=[lyr.first_name,lyr.last_name].filter(Boolean).join(' ');
        tdL.appendChild(a);
      } else {
        tdL.appendChild(document.createTextNode([lyr.first_name,lyr.last_name].filter(Boolean).join(' ')));
      }
    });

    // PD
    const tdP=document.createElement('td');tdP.className='td-pd';
    tdP.innerHTML=c.public_domain==='Yes'?'<span class="pd-y">✓ Fri</span>'
      :c.public_domain==='No'?'<span class="pd-n">© Vernet</span>'
      :'<span class="pd-u">–</span>';

    // Links
    const tdLk=document.createElement('td');tdLk.className='td-links';
    if(c.musescore_link?.trim()){
      const a=document.createElement('a');
      a.className='btn-link';a.href=c.musescore_link.trim();
      a.target='_blank';a.rel='noopener';a.title='Åpne på MuseScore';
      a.innerHTML=ICON_MS+'MuseScore';
      tdLk.appendChild(a);
    }

    tr.append(tdN,tdT,tdY,tdL,tdP,tdLk);
    tbody.appendChild(tr);
  });

}catch(e){fail(e.message)}
})();
</script>
</body>
</html>
