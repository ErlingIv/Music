<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Composer — Norske Musikknoter</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400&family=Source+Serif+4:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
  /* ── Header — back-link needs an icon+text gap; mode switch sits at the far right ── */
  .back-link { display: flex; align-items: center; gap: 0.3rem; }
  .mode-switch-wrap { margin-left: auto; }

  /* ── Main ── */
  main { max-width: 860px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

  /* ── Composer hero ── */
  .composer-hero {
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 2rem;
    margin-bottom: 2rem;
  }
  .hero-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 1rem;
    margin-bottom: 1rem;
  }
  .composer-photo {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    object-fit: cover;
    border: 1px solid var(--border);
    flex-shrink: 0;
  }
  .composer-name {
    font-family: var(--serif);
    font-size: clamp(1.6rem, 3vw, 2.2rem);
    font-weight: 700;
    line-height: 1.1;
    color: var(--ink);
  }
  .composer-dates {
    font-size: 1rem;
    color: var(--muted);
    margin-top: 0.3rem;
    font-weight: 300;
  }
  .badges { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.5rem; }
  .badge-female { background: #f0e6f0; color: #7a3a7a; border-color: #d4b8d4; }
  .badge-nation { background: #eaf0f6; color: #1a4a6e; border-color: #b8cfe0; }
  .badge-lyricist { background: #f0f4e8; color: #3a5c1e; border-color: #c0d4a0; }

  .bio-text {
    font-size: 0.95rem;
    line-height: 1.75;
    color: var(--ink);
    margin-top: 1rem;
    padding-top: 1rem;
    border-top: 1px solid var(--faint);
  }
  .bio-link {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    margin-top: 0.75rem;
    font-size: 0.85rem;
    color: var(--accent);
    text-decoration: none;
    border: 1px solid var(--accent);
    border-radius: 5px;
    padding: 5px 12px;
  }
  .bio-link:hover { background: var(--accent); color: #fff; }

  /* ── Role switcher ── */
  .role-switcher {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1.25rem;
  }
  .role-btn {
    font-family: var(--body);
    font-size: 0.82rem;
    padding: 5px 14px;
    border-radius: 5px;
    border: 1px solid var(--border);
    background: var(--paper);
    color: var(--muted);
    cursor: pointer;
    text-decoration: none;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .role-btn:hover { border-color: var(--accent2); color: var(--accent2); }
  .role-btn.active {
    background: var(--accent2);
    border-color: var(--accent2);
    color: #fff;
  }

  /* ── Scores section ── */
  .scores-heading {
    font-family: var(--serif);
    font-size: 1.2rem;
    font-weight: 500;
    color: var(--ink);
    margin-bottom: 1rem;
    padding-bottom: 0.6rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 0.75rem;
  }
  .scores-heading-count {
    font-family: var(--body);
    font-size: 0.82rem;
    color: var(--muted);
    font-weight: 400;
  }

  .score-list { display: flex; flex-direction: column; gap: 0.5rem; }
  .score-row {
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.8rem 1rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    text-decoration: none;
    transition: border-color 0.15s, box-shadow 0.15s;
    overflow: hidden;
  }
  .score-row:hover {
    border-color: var(--accent);
    box-shadow: 0 2px 8px rgba(139,58,30,0.08);
  }
  .score-title {
    font-family: var(--serif);
    font-size: 0.95rem;
    font-weight: 500;
    color: var(--ink);
  }
  .score-meta {
    font-size: 0.78rem;
    color: var(--muted);
    margin-top: 2px;
    display: flex;
    gap: 0.75rem;
  }
  .score-icons { display: flex; gap: 0.4rem; flex-shrink: 0; align-items: center; }
  .icon-badge.has-pdf { color: var(--accent); border-color: var(--accent); }
  .icon-badge.has-mp3 { color: var(--accent2); border-color: var(--accent2); }

  /* Discrete Godkjent (approved) mark — small muted dot, no visible label */
  .godkjent-mark {
    display: inline-block;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--accent2);
    opacity: 0.5;
    margin-left: 7px;
    vertical-align: middle;
    flex-shrink: 0;
  }

  /* ── Opus groups (mini-tags within composer page) ── */
  .opus-group {
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  .opus-group-header {
    width: 100%;
    background: var(--faint);
    border: none;
    padding: 0.8rem 1rem;
    display: flex;
    align-items: center;
    gap: 0.6rem;
    cursor: pointer;
    font-family: var(--body);
    text-align: left;
  }
  .opus-group-header:hover { background: #e0dac8; }
  .opus-group-title {
    font-family: var(--serif);
    font-size: 0.95rem;
    font-weight: 500;
    color: var(--ink);
  }
  .opus-group-count {
    font-size: 0.78rem;
    color: var(--muted);
  }
  .opus-group-chevron {
    margin-left: auto;
    color: var(--muted);
    font-size: 0.75rem;
    transition: transform 0.15s;
    flex-shrink: 0;
  }
  .opus-group.open .opus-group-chevron { transform: rotate(180deg); }
  .opus-group-body {
    display: none;
    flex-direction: column;
    gap: 0.5rem;
    padding: 0.5rem;
    border-top: 1px solid var(--border);
  }
  .opus-group.open .opus-group-body { display: flex; }
  .opus-group-body .score-row { border-radius: 4px; }

  /* ── Responsive: phones (≤640px) ── */
  @media (max-width: 640px) {
    .composer-hero { padding: 1.25rem; }
    .hero-top { flex-wrap: wrap; }
    .composer-photo { width: 56px; height: 56px; }
    .role-switcher { flex-wrap: wrap; }
    .score-row { flex-wrap: wrap; row-gap: 0.5rem; }
    .score-icons { flex-wrap: wrap; }
  }

</style>
</head>
<body>

<header class="site-header">
  <a class="back-link" href="index.html" id="backLink">← Back</a>
  <a class="site-name" href="index.html" id="siteNameLink">Norske Musikknoter</a>

  <div class="mode-switch-wrap" title="Switch between public domain and copyright-protected scores">
    <span class="mode-switch-label active" id="modeLabelPD" role="button" tabindex="0"
          onclick="switchSiteMode('pd')"
          onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();switchSiteMode('pd')}">Public Domain</span>
    <label class="mode-switch">
      <input type="checkbox" id="modeToggle" aria-label="Toggle between public domain and copyright mode" onchange="switchSiteMode(this.checked ? 'copyright' : 'pd')">
      <span class="mode-switch-slider"></span>
    </label>
    <span class="mode-switch-label" id="modeLabelCopyright" role="button" tabindex="0"
          onclick="switchSiteMode('copyright')"
          onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();switchSiteMode('copyright')}">Copyright</span>
  </div>
</header>

<main>
  <div id="content"><div class="loading-state">Loading…</div></div>
</main>

<script src="config.js"></script>
<script src="shared.js"></script>
<script>
document.getElementById('siteNameLink').textContent = SITE_NAME;
const SUPABASE_URL = 'https://tfqnzszyjsdgdeksizel.supabase.co';
const SUPABASE_KEY = 'sb_publishable_TxNG1PKrOD3NuBwCKzEfMA_b3-21kij';
const H = { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` };

const params    = new URLSearchParams(window.location.search);
const personId  = params.get('id');
const roleParam = params.get('role') || 'Composer'; // 'Composer' or 'Lyricist'

// ── Site mode: 'pd' (public domain) or 'copyright' ─────────────────────────────
// Carried in from index.html via ?mode=copyright, or toggled locally on this page.
let siteMode = params.get('mode') === 'copyright' ? 'copyright' : 'pd';
function selfHref(role) {
  return `composer.html?id=${personId}&role=${role}${siteMode === 'copyright' ? '&mode=copyright' : ''}`;
}

// Reflect initial mode in the toggle UI
document.getElementById('modeToggle').checked = (siteMode === 'copyright');
document.getElementById('modeLabelPD').classList.toggle('active', siteMode === 'pd');
document.getElementById('modeLabelCopyright').classList.toggle('active', siteMode === 'copyright');
document.getElementById('backLink').href = siteMode === 'copyright' ? 'index.html?mode=copyright' : 'index.html';

function switchSiteMode(mode) {
  if (mode === siteMode) return;
  siteMode = mode;
  document.getElementById('modeToggle').checked = (mode === 'copyright');
  document.getElementById('modeLabelPD').classList.toggle('active', mode === 'pd');
  document.getElementById('modeLabelCopyright').classList.toggle('active', mode === 'copyright');
  document.getElementById('backLink').href = mode === 'copyright' ? 'index.html?mode=copyright' : 'index.html';
  load();
}

async function load() {
  const el = document.getElementById('content');
  if (!personId) {
    el.innerHTML = '<p class="error-state">No person ID specified.</p>';
    return;
  }

  try {
    // 1. Fetch person
    const pR = await fetch(
      `${SUPABASE_URL}/rest/v1/person?person_id=eq.${personId}&select=person_id,first_name,last_name,born,died,died_uncertain,nationality,birth_country,birth_country_primary,gender,bio_url,bio_text,pseudonym,photo_url`,
      { headers: H }
    );
    const person = (await pR.json())[0];
    if (!person) throw new Error('Person not found');
    document.title = `${person.first_name} ${person.last_name} — ${SITE_NAME}`;

    // 2. Check which roles this person has (to show switcher if both)
    const rolesR = await fetch(
      `${SUPABASE_URL}/rest/v1/composition_person?person_id=eq.${personId}&select=role`,
      { headers: H }
    );
    const rolesData = await rolesR.json();
    const roleSet = new Set(rolesData.map(r => r.role));
    const hasComposer = roleSet.has('Composer');
    const hasLyricist = roleSet.has('Lyricist');

    // 3. Fetch composition_ids for this person in the active role
    const ccR = await fetch(
      `${SUPABASE_URL}/rest/v1/composition_person?person_id=eq.${personId}&role=eq.${roleParam}&select=composition_id,credited_as`,
      { headers: H }
    );
    const cc = await ccR.json();
    // Map composition_id → credited_as (only where set)
    const creditedAsMap = {};
    cc.forEach(r => { if (r.credited_as) creditedAsMap[r.composition_id] = r.credited_as; });

    // 4. Fetch public domain compositions that have a MuseScore link
    let compositions = [];
    const scoreMap = {};
    const tagMap   = {};
    if (cc.length) {
      const compIds = cc.map(r => r.composition_id).join(',');
      const pdFilter  = siteMode === 'copyright' ? 'neq.Yes' : 'eq.Yes';
      const linkParam = siteMode === 'copyright' ? '' : '&musescore_link=not.is.null';
      const cR = await fetch(
        `${SUPABASE_URL}/rest/v1/composition?composition_id=in.(${compIds})&public_domain=${pdFilter}${linkParam}&select=composition_id,title,year_composed,musescore_link,public_domain,musescore_notes,opus_number,approved&order=title.asc`,
        { headers: H }
      );
      compositions = await cR.json();

      // 5. Fetch scores (pdf_url, mp3_url) and tags for these compositions
      const allCompIds = cc.map(r => r.composition_id).join(',');
      const [scoreR, ctR, tagR] = await Promise.all([
        fetch(`${SUPABASE_URL}/rest/v1/score?composition_id=in.(${allCompIds})&select=composition_id,pdf_url,mp3_url,plate_number,publisher:publisher_id(publisher_name)`, { headers: H }),
        fetch(`${SUPABASE_URL}/rest/v1/composition_tag?composition_id=in.(${allCompIds})&select=composition_id,tag_id`, { headers: H }),
        fetch(`${SUPABASE_URL}/rest/v1/tag?select=tag_id,tag_name`, { headers: H }),
      ]);
      const scores = await scoreR.json();
      scores.forEach(s => { scoreMap[s.composition_id] = s; });

      const ctRows  = await ctR.json();
      const allTags = await tagR.json();
      const tagNameMap = Object.fromEntries(allTags.map(t => [t.tag_id, t.tag_name]));
      ctRows.forEach(row => {
        if (!tagMap[row.composition_id]) tagMap[row.composition_id] = [];
        const name = tagNameMap[row.tag_id];
        if (name) tagMap[row.composition_id].push(name);
      });
    }

    // ── Render ──────────────────────────────────────────────────────────────

    const years  = lifespan(person.born, person.died, person.died_uncertain);
    const flag   = renderFlags(person.nationality, person.birth_country, person.birth_country_primary);
    const female = person.gender === 'F';

    // Role switcher: only show if person appears in multiple roles
    const showSwitcher = hasComposer && hasLyricist;
    const switcherHtml = showSwitcher ? `
      <div class="role-switcher">
        <a class="role-btn ${roleParam === 'Composer' ? 'active' : ''}"
           ${roleParam === 'Composer' ? 'aria-current="page"' : ''}
           href="${selfHref('Composer')}">As composer</a>
        <a class="role-btn ${roleParam === 'Lyricist' ? 'active' : ''}"
           ${roleParam === 'Lyricist' ? 'aria-current="page"' : ''}
           href="${selfHref('Lyricist')}">As lyricist</a>
      </div>` : '';

    const scoresHeading = roleParam === 'Lyricist' ? 'Scores as lyricist' : 'Scores';

    el.innerHTML = `
      <div class="composer-hero">
        <div class="hero-top">
          <div style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap">
            ${person.photo_url ? `<img src="${person.photo_url}" alt="Photo of ${person.first_name} ${person.last_name}" class="composer-photo">` : ''}
            <div>
            <h1 class="composer-name">${person.first_name} ${person.last_name} ${flag}</h1>
            ${years ? `<p class="composer-dates">${years}</p>` : ''}
            <div class="badges" style="margin-top:0.5rem">
              ${female ? '<span class="badge badge-female">♀ Female composer</span>' : ''}
              ${person.nationality ? `<span class="badge badge-nation">${person.nationality.toUpperCase()}</span>` : ''}
              ${roleParam === 'Lyricist' && !hasComposer ? '<span class="badge badge-lyricist">Lyricist</span>' : ''}
            </div>
            ${person.pseudonym ? `<p class="composer-dates" style="font-style:italic;margin-top:0.5rem">Also known as: ${person.pseudonym}</p>` : ''}
            </div>
          </div>
          ${(person.bio_text || person.bio_url) ? `
          <div style="flex-shrink:0">
            <a class="bio-link" href="${person.bio_text ? `bio.html?id=${personId}` : person.bio_url}" ${person.bio_text ? '' : 'target="_blank"'} style="margin-top:0">
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                <path d="M4.5 1.5H2a1 1 0 00-1 1v7a1 1 0 001 1h7a1 1 0 001-1V7m-3-5.5h4m0 0v4m0-4L5.5 7" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              Biography
            </a>
          </div>` : ''}
        </div>
      </div>

      ${switcherHtml}

      <div class="scores-heading">
        ${scoresHeading}
        <span class="scores-heading-count">${compositions.length} work${compositions.length !== 1 ? 's' : ''}</span>
        <label style="margin-left:auto;font-size:0.78rem;color:var(--muted);display:flex;align-items:center;gap:0.4rem;font-weight:400;cursor:pointer;">
          <input type="checkbox" id="filterMedia" onchange="filterScores()" style="width:auto;margin:0;accent-color:var(--accent);">
          With PDF / MP3 only
        </label>
      </div>

      ${compositions.length === 0
        ? `<div class="loading-state">No ${siteMode === 'copyright' ? 'copyright' : 'public domain'} scores found${roleParam === 'Lyricist' ? ' as lyricist' : ''}.</div>`
        : `<div class="score-list" id="scoreList">
            ${renderScoreItems(compositions, scoreMap, tagMap, creditedAsMap)}
          </div>`
      }
    `;
  } catch(e) {
    document.getElementById('content').innerHTML =
      `<p class="error-state">Error: ${e.message}</p>`;
  }
}

function scoreRowHtml(c, scoreMap, tagMap, creditedAsMap) {
  const s = scoreMap[c.composition_id];
  const hasMedia = !!(s?.pdf_url || s?.mp3_url);
  return `
    <a class="score-row" href="${scoreHref(c.composition_id)}" data-has-media="${hasMedia}">
      <div>
        <div class="score-title">${c.title}${c.approved ? '<span class="godkjent-mark" role="img" aria-label="Curator approved" title="Curator approved"></span>' : ''}</div>
        <div class="score-meta">
          ${c.year_composed ? `<span>${c.year_composed}</span>` : ''}
          ${s?.publisher?.publisher_name ? `<span>${s.publisher.publisher_name}</span>` : ''}
          ${s?.plate_number ? `<span style="font-family:monospace;font-size:0.72rem;opacity:0.85">${s.plate_number}</span>` : ''}
          ${creditedAsMap[c.composition_id] ? `<span style="font-style:italic;color:var(--muted)">as ${creditedAsMap[c.composition_id]}</span>` : ''}
          ${(tagMap[c.composition_id]||[]).map(t => `<span style="background:#eaf3ee;color:var(--accent2);border:1px solid #b8d4c0;border-radius:3px;padding:1px 6px;font-size:0.7rem;">${t}</span>`).join('')}
        </div>
      </div>
      <div class="score-icons">
        ${s?.pdf_url ? '<span class="icon-badge has-pdf">PDF</span>' : ''}
        ${s?.mp3_url ? '<span class="icon-badge has-mp3">MP3</span>' : ''}
        ${c.musescore_link ? '<span class="icon-badge" title="Available on MuseScore" aria-label="Available on MuseScore">♪</span>' : ''}
        ${c.public_domain === 'Yes' ? '<span class="icon-badge" style="color:var(--accent2);border-color:var(--accent2)">PD</span>' : ''}
        ${msInfoBadge(c.musescore_notes)}
      </div>
    </a>`;
}

function opusBaseKey(opus) {
  if (!opus) return null;
  const trimmed = opus.trim();
  if (!trimmed) return null;
  // Strip a trailing "no. X" / "nr. X" movement number to find the shared opus, e.g.
  // "Opus 10 no. 1" / "op. 23 no. 2" → "Opus 10" / "op. 23". Plain values like
  // "op. 16" or "WoO 14" pass through unchanged.
  const m = trimmed.match(/^(.*?)[\s,]+(?:no|nr)\.?\s*\d+[a-z]?\.?\s*$/i);
  return (m ? m[1] : trimmed).trim();
}

function groupByOpus(compositions) {
  // Only group compositions that share a non-empty base opus, 2+ works.
  const byOpus = {}; // normalized key → { label, list }
  compositions.forEach(c => {
    const base = opusBaseKey(c.opus_number);
    if (!base) return;
    const key = base.toLowerCase();
    if (!byOpus[key]) byOpus[key] = { label: base, list: [] };
    byOpus[key].list.push(c);
  });
  Object.keys(byOpus).forEach(k => { if (byOpus[k].list.length < 2) delete byOpus[k]; });

  const rendered = new Set();
  const items = [];
  compositions.forEach(c => {
    const base = opusBaseKey(c.opus_number);
    const key = base ? base.toLowerCase() : null;
    if (key && byOpus[key]) {
      if (!rendered.has(key)) {
        rendered.add(key);
        items.push({ type: 'group', opus: byOpus[key].label, list: byOpus[key].list });
      }
    } else {
      items.push({ type: 'single', c });
    }
  });
  return items;
}

function renderScoreItems(compositions, scoreMap, tagMap, creditedAsMap) {
  const items = groupByOpus(compositions);
  return items.map(item => {
    if (item.type === 'single') {
      return scoreRowHtml(item.c, scoreMap, tagMap, creditedAsMap);
    }
    const rowsHtml = item.list.map(c => scoreRowHtml(c, scoreMap, tagMap, creditedAsMap)).join('');
    return `
      <div class="opus-group">
        <button type="button" class="opus-group-header" aria-expanded="false"
                onclick="this.parentElement.classList.toggle('open'); this.setAttribute('aria-expanded', this.parentElement.classList.contains('open'))">
          <span class="opus-group-title">${item.opus}</span>
          <span class="opus-group-count">${item.list.length} works</span>
          <span class="opus-group-chevron" aria-hidden="true">▾</span>
        </button>
        <div class="opus-group-body">${rowsHtml}</div>
      </div>`;
  }).join('');
}

function filterScores() {
  const checked = document.getElementById('filterMedia').checked;
  document.querySelectorAll('#scoreList .score-row').forEach(row => {
    row.style.display = (!checked || row.dataset.hasMedia === 'true') ? '' : 'none';
  });
  document.querySelectorAll('#scoreList .opus-group').forEach(group => {
    const anyVisible = [...group.querySelectorAll('.score-row')].some(r => r.style.display !== 'none');
    group.style.display = anyVisible ? '' : 'none';
    if (checked && anyVisible) group.classList.add('open');
  });
}

load();
</script>
</body>
</html>
