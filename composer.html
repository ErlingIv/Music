<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Composer — Norske Musikknoter</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400&family=Source+Serif+4:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #f7f4ee;
    --paper:   #fffef9;
    --ink:     #1a1814;
    --muted:   #7a7060;
    --faint:   #e8e2d4;
    --accent:  #8b3a1e;
    --accent2: #2a5c45;
    --border:  #d4cdc0;
    --serif:   'Playfair Display', Georgia, serif;
    --body:    'Source Serif 4', Georgia, serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--body); background: var(--bg); color: var(--ink); min-height: 100vh; }

  /* ── Header ── */
  .site-header {
    background: var(--paper);
    border-bottom: 1px solid var(--border);
    padding: 1rem 2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
  }
  .back-link {
    font-size: 0.82rem;
    color: var(--muted);
    text-decoration: none;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 0.3rem;
  }
  .back-link:hover { color: var(--accent); }
  .site-name {
    font-family: var(--serif);
    font-size: 1rem;
    font-weight: 500;
    color: var(--ink);
    text-decoration: none;
  }

  /* ── Main ── */
  main { max-width: 860px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

  /* ── Composer hero ── */
  .composer-hero {
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 2rem;
    margin-bottom: 2rem;
  }
  .hero-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 1rem;
    margin-bottom: 1rem;
  }
  .composer-name {
    font-family: var(--serif);
    font-size: clamp(1.6rem, 3vw, 2.2rem);
    font-weight: 700;
    line-height: 1.1;
    color: var(--ink);
  }
  .composer-dates {
    font-size: 1rem;
    color: var(--muted);
    margin-top: 0.3rem;
    font-weight: 300;
  }
  .badges { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.5rem; }
  .badge {
    font-size: 0.75rem;
    padding: 3px 10px;
    border-radius: 4px;
    border: 1px solid;
    letter-spacing: 0.03em;
  }
  .badge-female { background: #f0e6f0; color: #7a3a7a; border-color: #d4b8d4; }
  .badge-nation { background: #eaf0f6; color: #1a4a6e; border-color: #b8cfe0; }
  .badge-lyricist { background: #f0f4e8; color: #3a5c1e; border-color: #c0d4a0; }

  .bio-text {
    font-size: 0.95rem;
    line-height: 1.75;
    color: var(--ink);
    margin-top: 1rem;
    padding-top: 1rem;
    border-top: 1px solid var(--faint);
  }
  .bio-link {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    margin-top: 0.75rem;
    font-size: 0.85rem;
    color: var(--accent);
    text-decoration: none;
    border: 1px solid var(--accent);
    border-radius: 5px;
    padding: 5px 12px;
  }
  .bio-link:hover { background: var(--accent); color: #fff; }

  /* ── Role switcher ── */
  .role-switcher {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1.25rem;
  }
  .role-btn {
    font-family: var(--body);
    font-size: 0.82rem;
    padding: 5px 14px;
    border-radius: 5px;
    border: 1px solid var(--border);
    background: var(--paper);
    color: var(--muted);
    cursor: pointer;
    text-decoration: none;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .role-btn:hover { border-color: var(--accent2); color: var(--accent2); }
  .role-btn.active {
    background: var(--accent2);
    border-color: var(--accent2);
    color: #fff;
  }

  /* ── Scores section ── */
  .scores-heading {
    font-family: var(--serif);
    font-size: 1.2rem;
    font-weight: 500;
    color: var(--ink);
    margin-bottom: 1rem;
    padding-bottom: 0.6rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 0.75rem;
  }
  .scores-heading-count {
    font-family: var(--body);
    font-size: 0.82rem;
    color: var(--muted);
    font-weight: 400;
  }

  .score-list { display: flex; flex-direction: column; gap: 0.5rem; }
  .score-row {
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.8rem 1rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    text-decoration: none;
    transition: border-color 0.15s, box-shadow 0.15s;
    overflow: hidden;
  }
  .score-row:hover {
    border-color: var(--accent);
    box-shadow: 0 2px 8px rgba(139,58,30,0.08);
  }
  .score-title {
    font-family: var(--serif);
    font-size: 0.95rem;
    font-weight: 500;
    color: var(--ink);
  }
  .score-meta {
    font-size: 0.78rem;
    color: var(--muted);
    margin-top: 2px;
    display: flex;
    gap: 0.75rem;
  }
  .score-icons { display: flex; gap: 0.4rem; flex-shrink: 0; align-items: center; }
  .icon-badge {
    font-size: 0.68rem;
    padding: 2px 7px;
    border-radius: 3px;
    border: 1px solid var(--border);
    color: var(--muted);
    background: var(--bg);
    letter-spacing: 0.04em;
  }
  .icon-badge.has-pdf { color: var(--accent); border-color: var(--accent); }
  .icon-badge.has-mp3 { color: var(--accent2); border-color: var(--accent2); }
  .ms-dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
  .ms-dot.ms-low  { background: #aaa49c; }
  .ms-dot.ms-med  { background: #3a6ea8; }
  .ms-dot.ms-high { background: #cc2200; }

  .loading-state {
    text-align: center;
    padding: 3rem;
    color: var(--muted);
    font-size: 0.9rem;
  }
  .error-state { color: #a32d2d; font-size: 0.9rem; padding: 1rem 0; }
</style>
</head>
<body>

<header class="site-header">
  <a class="back-link" href="index.html">← Back</a>
  <a class="site-name" href="index.html" id="siteNameLink">Norske Musikknoter</a>
</header>

<main>
  <div id="content"><div class="loading-state">Loading…</div></div>
</main>

<script src="config.js"></script>
<script>
document.getElementById('siteNameLink').textContent = SITE_NAME;
const SUPABASE_URL = 'https://tfqnzszyjsdgdeksizel.supabase.co';
const SUPABASE_KEY = 'sb_publishable_TxNG1PKrOD3NuBwCKzEfMA_b3-21kij';
const H = { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` };

function flagEmoji(code) {
  if (!code || code.length !== 2) return '';
  return [...code.toUpperCase()].map(c =>
    String.fromCodePoint(0x1F1E0 - 65 + c.charCodeAt(0))
  ).join('');
}

const params    = new URLSearchParams(window.location.search);
const personId  = params.get('id');
const roleParam = params.get('role') || 'Composer'; // 'Composer' or 'Lyricist'

function wordCount(text) {
  if (!text || !text.trim()) return 0;
  return text.trim().split(/\s+/).length;
}

function msInfoBadge(notes) {
  const wc = wordCount(notes);
  if (wc === 0)  return '<span class="ms-dot ms-low" style="visibility:hidden"></span>';
  if (wc <= 100) return '<span class="ms-dot ms-low"  title="MuseScore info: ~' + wc + ' words"></span>';
  if (wc <= 300) return '<span class="ms-dot ms-med"  title="MuseScore info: ~' + wc + ' words"></span>';
                 return '<span class="ms-dot ms-high" title="MuseScore info: ~' + wc + ' words"></span>';
}

async function load() {
  const el = document.getElementById('content');
  if (!personId) {
    el.innerHTML = '<p class="error-state">No person ID specified.</p>';
    return;
  }

  try {
    // 1. Fetch person
    const pR = await fetch(
      `${SUPABASE_URL}/rest/v1/person?person_id=eq.${personId}&select=person_id,first_name,last_name,born,died,nationality,gender,bio_url,bio_text`,
      { headers: H }
    );
    const person = (await pR.json())[0];
    if (!person) throw new Error('Person not found');
    document.title = `${person.first_name} ${person.last_name} — ${SITE_NAME}`;

    // 2. Check which roles this person has (to show switcher if both)
    const rolesR = await fetch(
      `${SUPABASE_URL}/rest/v1/composition_person?person_id=eq.${personId}&select=role`,
      { headers: H }
    );
    const rolesData = await rolesR.json();
    const roleSet = new Set(rolesData.map(r => r.role));
    const hasComposer = roleSet.has('Composer');
    const hasLyricist = roleSet.has('Lyricist');

    // 3. Fetch composition_ids for this person in the active role
    const ccR = await fetch(
      `${SUPABASE_URL}/rest/v1/composition_person?person_id=eq.${personId}&role=eq.${roleParam}&select=composition_id`,
      { headers: H }
    );
    const cc = await ccR.json();

    // 4. Fetch public domain compositions that have a MuseScore link
    let compositions = [];
    const scoreMap = {};
    const tagMap   = {};
    if (cc.length) {
      const compIds = cc.map(r => r.composition_id).join(',');
      const cR = await fetch(
        `${SUPABASE_URL}/rest/v1/composition?composition_id=in.(${compIds})&public_domain=eq.Yes&musescore_link=not.is.null&select=composition_id,title,year_composed,musescore_link,public_domain,musescore_notes&order=title.asc`,
        { headers: H }
      );
      compositions = await cR.json();

      // 5. Fetch scores (pdf_url, mp3_url) and tags for these compositions
      const allCompIds = cc.map(r => r.composition_id).join(',');
      const [scoreR, ctR, tagR] = await Promise.all([
        fetch(`${SUPABASE_URL}/rest/v1/score?composition_id=in.(${allCompIds})&select=composition_id,pdf_url,mp3_url`, { headers: H }),
        fetch(`${SUPABASE_URL}/rest/v1/composition_tag?composition_id=in.(${allCompIds})&select=composition_id,tag_id`, { headers: H }),
        fetch(`${SUPABASE_URL}/rest/v1/tag?select=tag_id,tag_name`, { headers: H }),
      ]);
      const scores = await scoreR.json();
      scores.forEach(s => { scoreMap[s.composition_id] = s; });

      const ctRows  = await ctR.json();
      const allTags = await tagR.json();
      const tagNameMap = Object.fromEntries(allTags.map(t => [t.tag_id, t.tag_name]));
      ctRows.forEach(row => {
        if (!tagMap[row.composition_id]) tagMap[row.composition_id] = [];
        const name = tagNameMap[row.tag_id];
        if (name) tagMap[row.composition_id].push(name);
      });
    }

    // ── Render ──────────────────────────────────────────────────────────────

    const years  = [person.born, person.died].filter(Boolean).join('–');
    const flag   = flagEmoji(person.nationality);
    const female = person.gender === 'F';
    const bioHtml = person.bio_text ? person.bio_text.replace(/\n/g, '<br>') : '';

    // Role switcher: only show if person appears in multiple roles
    const showSwitcher = hasComposer && hasLyricist;
    const switcherHtml = showSwitcher ? `
      <div class="role-switcher">
        <a class="role-btn ${roleParam === 'Composer' ? 'active' : ''}"
           href="composer.html?id=${personId}&role=Composer">As composer</a>
        <a class="role-btn ${roleParam === 'Lyricist' ? 'active' : ''}"
           href="composer.html?id=${personId}&role=Lyricist">As lyricist</a>
      </div>` : '';

    const scoresHeading = roleParam === 'Lyricist' ? 'Scores as lyricist' : 'Scores';

    el.innerHTML = `
      <div class="composer-hero">
        <div class="hero-top">
          <div>
            <h1 class="composer-name">${person.first_name} ${person.last_name} ${flag}</h1>
            ${years ? `<p class="composer-dates">${years}</p>` : ''}
            <div class="badges">
              ${female ? '<span class="badge badge-female">♀ Female composer</span>' : ''}
              ${person.nationality ? `<span class="badge badge-nation">${person.nationality}</span>` : ''}
              ${roleParam === 'Lyricist' && !hasComposer ? '<span class="badge badge-lyricist">Lyricist</span>' : ''}
            </div>
          </div>
        </div>

        ${bioHtml ? `<div class="bio-text">${bioHtml}</div>` : ''}

        ${person.bio_url ? `
          <a class="bio-link" href="${person.bio_url}" target="_blank">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
              <path d="M4.5 1.5H2a1 1 0 00-1 1v7a1 1 0 001 1h7a1 1 0 001-1V7m-3-5.5h4m0 0v4m0-4L5.5 7" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Biography
          </a>` : ''}
      </div>

      ${switcherHtml}

      <div class="scores-heading">
        ${scoresHeading}
        <span class="scores-heading-count">${compositions.length} work${compositions.length !== 1 ? 's' : ''}</span>
        <label style="margin-left:auto;font-size:0.78rem;color:var(--muted);display:flex;align-items:center;gap:0.4rem;font-weight:400;cursor:pointer;">
          <input type="checkbox" id="filterMedia" onchange="filterScores()" style="width:auto;margin:0;accent-color:var(--accent);">
          With PDF / MP3 only
        </label>
      </div>

      ${compositions.length === 0
        ? `<div class="loading-state">No public domain scores found${roleParam === 'Lyricist' ? ' as lyricist' : ''}.</div>`
        : `<div class="score-list" id="scoreList">
            ${compositions.map(c => {
              const s = scoreMap[c.composition_id];
              const hasMedia = !!(s?.pdf_url || s?.mp3_url);
              return `
                <a class="score-row" href="score.html?id=${c.composition_id}" data-has-media="${hasMedia}">
                  <div>
                    <div class="score-title">${c.title}</div>
                    <div class="score-meta">
                      ${c.year_composed ? `<span>${c.year_composed}</span>` : ''}
                      ${(tagMap[c.composition_id]||[]).map(t => `<span style="background:#eaf3ee;color:var(--accent2);border:1px solid #b8d4c0;border-radius:3px;padding:1px 6px;font-size:0.7rem;">${t}</span>`).join('')}
                    </div>
                  </div>
                  <div class="score-icons">
                    ${s?.pdf_url ? '<span class="icon-badge has-pdf">PDF</span>' : ''}
                    ${s?.mp3_url ? '<span class="icon-badge has-mp3">MP3</span>' : ''}
                    ${c.musescore_link ? '<span class="icon-badge">♪</span>' : ''}
                    ${c.public_domain === 'Yes' ? '<span class="icon-badge" style="color:var(--accent2);border-color:var(--accent2)">PD</span>' : ''}
                    ${msInfoBadge(c.musescore_notes)}
                  </div>
                </a>`;
            }).join('')}
          </div>`
      }
    `;
  } catch(e) {
    document.getElementById('content').innerHTML =
      `<p class="error-state">Error: ${e.message}</p>`;
  }
}

function filterScores() {
  const checked = document.getElementById('filterMedia').checked;
  document.querySelectorAll('#scoreList .score-row').forEach(row => {
    row.style.display = (!checked || row.dataset.hasMedia === 'true') ? '' : 'none';
  });
}

load();
</script>
</body>
</html>
